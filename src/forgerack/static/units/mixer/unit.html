<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  JUNCTION MX-04 — Multi-Source Signal Mixer                  ║
 ║  Manufacturer: NORDKRAFT                                     ║
 ║  Identity: Clean Scandinavian birch, warm minimal.           ║
 ║  Merges 2-4 data streams into one output by row append       ║
 ║  or column join. The inverse of Splitter.                    ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<!-- ════════ FRONT PANEL ════════ -->
<div class="rack-unit-front u3 mfr-nordkraft" data-unit="mixer" data-id="${id}" style="
    --device-accent:#c8956a;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.005) 0px, transparent 1px, transparent 3px),
        linear-gradient(160deg, #1a1814 0%, #171510 30%, #191713 50%, #141210 80%);
    overflow:hidden;
">
    <!-- Nameplate -->
    <div style="
        display:flex;align-items:center;gap:8px;
        padding:4px 48px;
        border-bottom:2px solid rgba(0,0,0,0.3);
        background: linear-gradient(180deg, rgba(200,149,106,0.008), rgba(0,0,0,0.1));
    ">
        <div class="led-housing"><span class="led" id="${id}-led" style="width:6px;height:6px;"></span></div>
        <span style="font:600 14px/1 'Georgia','Times New Roman',serif;color:rgba(200,149,106,0.35);letter-spacing:0.08em;">Junction</span>
        <span style="font:300 9px/1 'Georgia',serif;color:rgba(200,149,106,0.15);font-style:italic;">Signal Mixer</span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
            <span style="font:600 9px/1 'Courier New',monospace;color:rgba(200,149,106,0.12);letter-spacing:0.06em;">MX-04</span>
        </div>
    </div>

    <!-- Controls -->
    <div style="padding:6px 48px;display:flex;align-items:center;gap:14px;">
        <!-- Mode selector -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            <div class="segment">
                <button class="segment-btn active" id="${id}-mode-append" onclick="FR.units['${id}']?.setMode?.('append')">Append</button>
                <button class="segment-btn" id="${id}-mode-join" onclick="FR.units['${id}']?.setMode?.('join')">Join</button>
            </div>
            <span style="font:400 8px/1 'Georgia',serif;color:rgba(200,149,106,0.2);text-transform:uppercase;letter-spacing:0.1em;">Mode</span>
        </div>

        <!-- Join key (visible when join mode) -->
        <div id="${id}-join-cfg" style="display:none;flex-direction:column;align-items:center;gap:2px;">
            <input type="text" id="${id}-join-key" placeholder="key col" class="input-mono" style="width:80px;font-size:9px;padding:3px 5px;background:rgba(0,0,0,0.3);border:1px solid rgba(200,149,106,0.12);color:#c8956a;border-radius:1px;">
            <span style="font:400 8px/1 'Georgia',serif;color:rgba(200,149,106,0.2);text-transform:uppercase;letter-spacing:0.1em;">Join Key</span>
        </div>

        <!-- Input indicators -->
        <div style="margin-left:auto;display:flex;gap:10px;">
            <div style="display:flex;align-items:center;gap:3px;"><span class="led" id="${id}-led-a"></span><span style="font:700 8px/1 'Arial',sans-serif;color:rgba(200,149,106,0.15);letter-spacing:0.06em;">A</span></div>
            <div style="display:flex;align-items:center;gap:3px;"><span class="led" id="${id}-led-b"></span><span style="font:700 8px/1 'Arial',sans-serif;color:rgba(200,149,106,0.15);letter-spacing:0.06em;">B</span></div>
            <div style="display:flex;align-items:center;gap:3px;"><span class="led" id="${id}-led-c"></span><span style="font:700 8px/1 'Arial',sans-serif;color:rgba(200,149,106,0.15);letter-spacing:0.06em;">C</span></div>
            <div style="display:flex;align-items:center;gap:3px;"><span class="led" id="${id}-led-d"></span><span style="font:700 8px/1 'Arial',sans-serif;color:rgba(200,149,106,0.15);letter-spacing:0.06em;">D</span></div>
        </div>

        <!-- Row count readout -->
        <div class="readout sm">
            <div class="readout-value" id="${id}-count" style="color:#c8956a;text-shadow:0 0 6px rgba(200,149,106,0.15);">0</div>
            <div class="readout-label" style="color:rgba(200,149,106,0.25);">Rows</div>
        </div>
    </div>
</div>

<!-- ════════ BACK PANEL ════════ -->
<div class="rack-unit-back u3" data-unit-back="mixer" data-id="${id}" style="
    background: repeating-linear-gradient(180deg, rgba(255,255,255,0.008) 0px, transparent 1px, transparent 4px),
                linear-gradient(160deg, #1c1c1c, #1f1f1f 40%, #1d1d1d);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 48px;border-bottom:1px solid rgba(255,255,255,0.05);">
        <span style="font:700 11px/1 'Arial',sans-serif;color:rgba(255,255,255,0.1);text-transform:uppercase;letter-spacing:0.15em;">Junction</span>
        <span style="font:400 11px/1 'Courier New',monospace;color:rgba(255,255,255,0.06);letter-spacing:0.06em;">MX-04</span>
        <span style="font:400 9px/1 'Courier New',monospace;color:rgba(255,255,255,0.04);margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 48px;display:flex;gap:24px;">
        <div>
            <div style="font:700 10px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:10px;">Input</div>
            <div style="display:flex;gap:12px;">
                <div class="patch-group"><div class="patch-jack" data-input="a" data-unit-id="${id}"></div><div class="patch-jack-label">A</div></div>
                <div class="patch-group"><div class="patch-jack" data-input="b" data-unit-id="${id}"></div><div class="patch-jack-label">B</div></div>
                <div class="patch-group"><div class="patch-jack" data-input="c" data-unit-id="${id}"></div><div class="patch-jack-label">C</div></div>
                <div class="patch-group"><div class="patch-jack" data-input="d" data-unit-id="${id}"></div><div class="patch-jack-label">D</div></div>
            </div>
        </div>
        <div>
            <div style="font:700 10px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:10px;">Output</div>
            <div style="display:flex;gap:12px;">
                <div class="patch-group"><div class="patch-jack" data-output="mixed" data-unit-id="${id}"></div><div class="patch-jack-label">Mixed</div></div>
            </div>
        </div>
    </div>
</div>
