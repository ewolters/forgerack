<div class="rack-unit-front u1" data-unit="blank-1u" data-id="${id}" style="
    --device-accent:#3a3f3a;
    background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.003) 0px, transparent 1px, transparent 2px),
        linear-gradient(180deg, #1a1e1a 0%, #161a16 40%, #141814 100%);
    display:flex;align-items:center;justify-content:center;
    border-top:1px solid rgba(255,255,255,0.02);
    border-bottom:1px solid rgba(0,0,0,0.3);
">
    <!-- Vent slots -->
    <div style="display:flex;gap:3px;">
        <div style="width:20px;height:2px;background:rgba(0,0,0,0.3);border-radius:1px;box-shadow:inset 0 1px 1px rgba(0,0,0,0.4);"></div>
        <div style="width:20px;height:2px;background:rgba(0,0,0,0.3);border-radius:1px;box-shadow:inset 0 1px 1px rgba(0,0,0,0.4);"></div>
        <div style="width:20px;height:2px;background:rgba(0,0,0,0.3);border-radius:1px;box-shadow:inset 0 1px 1px rgba(0,0,0,0.4);"></div>
        <div style="width:20px;height:2px;background:rgba(0,0,0,0.3);border-radius:1px;box-shadow:inset 0 1px 1px rgba(0,0,0,0.4);"></div>
        <div style="width:20px;height:2px;background:rgba(0,0,0,0.3);border-radius:1px;box-shadow:inset 0 1px 1px rgba(0,0,0,0.4);"></div>
    </div>
</div>

<div class="rack-unit-back u1" data-unit-back="blank-1u" data-id="${id}" style="
    background:linear-gradient(180deg, #1c1c1c, #1a1a1a);
"></div>
