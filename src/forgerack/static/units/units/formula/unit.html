<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  FORMULA FX-01 — Programmable Expression Evaluator           ║
 ║  Manufacturer: VAKUUM                                        ║
 ║  Identity: Same tube-amp warmth as CALC. Burgundy faceplate, ║
 ║  copper accents. But instead of preset transforms, you write ║
 ║  raw math. The programmable module next to the fixed one.    ║
 ║  Type col_a * 2 + col_b and it creates a new column.        ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<!-- ════════ FRONT PANEL ════════ -->
<div class="rack-unit-front u4 mfr-vakuum" data-unit="formula" data-id="${id}" style="
    --device-accent:#d4884a;
    background:
        radial-gradient(ellipse at 55% 35%, hsla(25,40%,50%,.03), transparent 55%),
        radial-gradient(ellipse at 15% 80%, hsla(340,15%,35%,.015), transparent 45%),
        linear-gradient(160deg, #1e1216 0%, #1a0f14 30%, #1c1015 50%, #160c10 80%);
    overflow:hidden;
">
    <!-- Nameplate -->
    <div style="
        display:flex;align-items:center;gap:8px;
        padding:4px 48px;
        border-bottom:2px solid rgba(0,0,0,0.3);
        background: linear-gradient(180deg, rgba(212,136,74,0.012), rgba(0,0,0,0.1));
    ">
        <div class="led-housing">
            <span class="led" id="${id}-led" style="width:6px;height:6px;"></span>
        </div>
        <span style="
            font:700 20px/1 'Georgia','Times New Roman',serif;
            color:transparent;
            text-shadow: 0 1px 0 rgba(212,136,74,0.4), 0 -1px 0 rgba(0,0,0,0.6);
            -webkit-text-stroke: 0.3px rgba(212,136,74,0.2);
            letter-spacing:0.12em;text-transform:uppercase;
        ">Formula</span>
        <span style="font:300 10px/1 'Georgia',serif;color:rgba(212,136,74,0.18);letter-spacing:0.06em;font-style:italic;">Expression Evaluator</span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
            <!-- Dual tube glow — programmable needs more heat -->
            <div style="width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 40% 35%, #e8a060, #804020);
                box-shadow:0 0 6px rgba(212,136,74,0.3);border:1px solid #402010;"></div>
            <div style="width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 40% 35%, #e8a060, #804020);
                box-shadow:0 0 6px rgba(212,136,74,0.25);border:1px solid #402010;"></div>
            <span style="font:500 10px/1 'Courier New',monospace;color:rgba(200,160,120,0.2);letter-spacing:0.06em;">FX-01</span>
        </div>
    </div>

    <div style="padding:6px 48px;display:flex;gap:10px;height:calc(100% - 36px);">

        <!-- ── LEFT: Expression input + log ── -->
        <div style="flex:1;display:flex;flex-direction:column;gap:5px;">

            <!-- Expression input bar -->
            <div style="display:flex;gap:4px;align-items:stretch;">
                <!-- Output column name -->
                <div class="panel-recessed" style="padding:3px 6px;display:flex;flex-direction:column;gap:2px;align-items:center;justify-content:center;">
                    <div style="font:700 7px/1 'Georgia',serif;color:rgba(212,136,74,0.25);text-transform:uppercase;letter-spacing:0.1em;">Output</div>
                    <input type="text" id="${id}-out-name" placeholder="result" style="
                        width:56px;background:rgba(0,0,0,0.5);border:1px solid rgba(212,136,74,0.15);
                        color:#d4884a;padding:2px 4px;border-radius:1px;text-align:center;
                        font:700 9px/1 'JetBrains Mono',monospace;box-sizing:border-box;
                        box-shadow:inset 0 1px 2px rgba(0,0,0,0.4);
                    ">
                </div>

                <!-- Expression field — the main input -->
                <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
                    <div style="font:700 7px/1 'Georgia',serif;color:rgba(212,136,74,0.25);text-transform:uppercase;letter-spacing:0.1em;">Expression</div>
                    <input type="text" id="${id}-expr" placeholder="col_a * 2 + col_b / 100" style="
                        width:100%;background:rgba(0,0,0,0.5);border:1px solid rgba(212,136,74,0.2);
                        color:#e8c090;padding:4px 8px;border-radius:1px;
                        font:12px/1 'JetBrains Mono',monospace;box-sizing:border-box;
                        box-shadow:inset 0 2px 4px rgba(0,0,0,0.4);
                        text-shadow:0 0 4px rgba(212,136,74,0.1);
                    ">
                </div>

                <!-- Evaluate button -->
                <button id="${id}-btn-eval" class="btn-run" style="align-self:flex-end;color:#d4884a;border-color:rgba(212,136,74,0.25);
                    background:linear-gradient(180deg,rgba(212,136,74,0.2),rgba(212,136,74,0.08));
                    font-family:'Georgia',serif;">Eval</button>
            </div>

            <!-- Available columns — reference strip -->
            <div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;min-height:16px;">
                <span style="font:600 7px/1 'Georgia',serif;color:rgba(212,136,74,0.2);text-transform:uppercase;letter-spacing:0.1em;flex-shrink:0;">Cols:</span>
                <div id="${id}-col-ref" style="display:flex;gap:3px;flex-wrap:wrap;">
                    <span style="font:9px/1 'JetBrains Mono',monospace;color:rgba(212,136,74,0.1);">load data to see columns</span>
                </div>
            </div>

            <!-- Evaluation log CRT — amber phosphor -->
            <div class="heater-glow" style="flex:1;min-height:0;
                background:rgba(0,0,0,0.35);border:1px solid rgba(0,0,0,0.5);border-radius:2px;
                box-shadow:inset 0 2px 6px rgba(0,0,0,0.4);
                position:relative;overflow:hidden;
            ">
                <div style="position:absolute;inset:0;
                    background:repeating-linear-gradient(180deg, transparent, transparent 2px, rgba(212,136,74,0.008) 2px, rgba(212,136,74,0.008) 4px);
                    pointer-events:none;z-index:2;"></div>
                <div style="position:absolute;inset:0;
                    background:radial-gradient(ellipse at center, rgba(212,136,74,0.015), transparent 80%);
                    pointer-events:none;z-index:2;"></div>
                <div style="position:absolute;inset:0;box-shadow:inset 0 0 15px rgba(0,0,0,0.3);pointer-events:none;z-index:3;"></div>

                <div id="${id}-log" style="
                    height:100%;overflow-y:auto;padding:5px 8px;
                    font:11px/1.6 'JetBrains Mono',monospace;
                    color:rgba(212,136,74,0.35);
                    text-shadow: 0 0 4px currentColor, 1.5px 0 0 rgba(255,0,255,0.1), -1.5px 0 0 rgba(0,255,255,0.1);
                    position:relative;z-index:1;
                "><span style="color:rgba(212,136,74,0.12);">&#x25A0; awaiting data_</span></div>
            </div>
        </div>

        <!-- ── RIGHT: Preview + built-in functions reference ── -->
        <div style="width:100px;display:flex;flex-direction:column;gap:3px;">

            <!-- Preview values -->
            <div style="
                flex:1;min-height:0;
                background:rgba(0,0,0,0.3);border:1px solid rgba(0,0,0,0.4);border-radius:2px;
                box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);
                overflow-y:auto;padding:3px 4px;
            ">
                <div id="${id}-preview" style="
                    font:10px/1.5 'JetBrains Mono',monospace;color:rgba(212,136,74,0.3);
                ">
                    <span style="color:rgba(212,136,74,0.1);">—</span>
                </div>
            </div>

            <!-- Row count nixie -->
            <div style="text-align:center;">
                <div class="nixie-tube" id="${id}-nixie-rows" style="position:relative;">
                    <div class="nixie-digit"><span class="nixie-digit-active" id="${id}-nix-0">—</span></div>
                    <div class="nixie-digit"><span class="nixie-digit-active" id="${id}-nix-1"></span></div>
                    <div class="nixie-digit"><span class="nixie-digit-active" id="${id}-nix-2"></span></div>
                    <div class="nixie-digit"><span class="nixie-digit-active" id="${id}-nix-3"></span></div>
                </div>
                <div class="nixie-label" style="color:rgba(212,136,74,0.3);">Rows</div>
            </div>

            <!-- Functions reference — tiny engraved list -->
            <div style="
                background:rgba(0,0,0,0.2);border:1px solid rgba(0,0,0,0.3);border-radius:1px;
                padding:3px 5px;
                box-shadow:inset 0 1px 2px rgba(0,0,0,0.3);
            ">
                <div style="font:600 6px/1 'Georgia',serif;color:rgba(212,136,74,0.2);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:2px;">Functions</div>
                <div style="font:8px/1.5 'JetBrains Mono',monospace;color:rgba(212,136,74,0.12);">
                    abs log sqrt<br>
                    round floor ceil<br>
                    min max pow<br>
                    pi e
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ════════ BACK PANEL ════════ -->
<div class="rack-unit-back u4" data-unit-back="formula" data-id="${id}" style="
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.005) 0px, transparent 1px, transparent 2px),
        linear-gradient(160deg, #1c1c1c, #1f1f1f 40%, #1d1d1d);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 48px;border-bottom:1px solid rgba(255,255,255,0.05);">
        <div class="nameplate-brass patina-oxidized">Formula FX-01</div>
        <span class="serial-tag" style="margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 48px;">
        <div style="font:700 10px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:10px;">Signal</div>
        <div style="display:flex;gap:18px;">
            <div class="patch-group"><div class="patch-jack" data-input="data" data-unit-id="${id}"></div><div class="patch-jack-label">data in</div></div>
            <div class="patch-group"><div class="patch-jack" data-output="result" data-unit-id="${id}"></div><div class="patch-jack-label">result</div></div>
            <div class="patch-group"><div class="patch-jack" data-output="thru" data-unit-id="${id}"></div><div class="patch-jack-label">thru</div></div>
            <div class="patch-group"><div class="patch-jack" data-output="column" data-unit-id="${id}"></div><div class="patch-jack-label">column</div></div>
        </div>
    </div>
    <div style="padding:6px 48px;margin-top:auto;border-top:1px solid rgba(212,136,74,0.02);">
        <div style="font:300 8px/1.6 'Courier New',monospace;color:rgba(212,136,74,0.04);letter-spacing:0.04em;">
            FORGERACK FORMULA &#x2022; FX-01 REV.A<br>EXPRESSION EVALUATOR &#x2022; VAKUUM MFG
        </div>
    </div>
</div>
