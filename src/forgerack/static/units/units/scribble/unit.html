<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  SCRIBBLE STRIP — 1U Label Module                           ║
 ║  Editable LED-style text label. Like a mixing console       ║
 ║  scribble strip. Type to label your signal chain sections.  ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<div class="rack-unit-front u1" data-unit="scribble" data-id="${id}" style="
    --device-accent:#22c55e;
    background:
        linear-gradient(180deg, #0e120e 0%, #0c100c 50%, #0a0e0a 100%);
    display:flex;align-items:center;padding:0 48px;gap:8px;
    border-top:1px solid rgba(34,197,94,0.03);
    border-bottom:1px solid rgba(0,0,0,0.3);
">
    <!-- Small LED -->
    <span class="led" style="width:5px;height:5px;background:radial-gradient(circle at 40% 35%, #4ade80, #166534);
        box-shadow:0 0 4px rgba(34,197,94,0.3);flex-shrink:0;"></span>

    <!-- Editable label — full width LED display -->
    <div style="flex:1;
        background:rgba(0,0,0,0.3);border:1px solid rgba(34,197,94,0.06);border-radius:1px;
        box-shadow:inset 0 1px 3px rgba(0,0,0,0.4);
        padding:2px 8px;position:relative;overflow:hidden;
    ">
        <!-- Subtle scanline -->
        <div style="position:absolute;inset:0;
            background:repeating-linear-gradient(180deg, transparent, transparent 1px, rgba(34,197,94,0.005) 1px, rgba(34,197,94,0.005) 2px);
            pointer-events:none;"></div>
        <input type="text" id="${id}-label" value="LABEL" maxlength="60" style="
            width:100%;background:transparent;border:none;outline:none;
            font:700 13px/1 'JetBrains Mono',monospace;color:rgba(34,197,94,0.5);
            letter-spacing:0.15em;text-transform:uppercase;
            text-shadow:0 0 6px rgba(34,197,94,0.15);
            position:relative;
        " placeholder="TYPE LABEL...">
    </div>

    <!-- Tiny model -->
    <span style="font:300 8px/1 'Courier New',monospace;color:rgba(34,197,94,0.06);flex-shrink:0;">SC-01</span>
</div>

<div class="rack-unit-back u1" data-unit-back="scribble" data-id="${id}" style="
    background:linear-gradient(180deg, #1c1c1c, #1a1a1a);
    display:flex;align-items:center;padding:0 48px;
">
    <span style="font:300 8px/1 'Courier New',monospace;color:rgba(255,255,255,0.03);">FORGERACK SCRIBBLE &#x2022; SC-01</span>
</div>
