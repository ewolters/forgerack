<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  COUNTER CT-01 — Event Accumulator                           ║
 ║  Manufacturer: KOSMOS                                        ║
 ║  Identity: Soviet space program. Olive/khaki sheet metal.    ║
 ║  Mechanical digit wheels. Chunky toggles. Raw, functional.   ║
 ║  Counts events, rows, triggers. Wire Tripwire → Counter.     ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<!-- ════════ FRONT PANEL ════════ -->
<div class="rack-unit-front u2 mfr-kosmos" data-unit="counter" data-id="${id}" style="
    --device-accent:#a3b18a;
    background: linear-gradient(160deg, #1e2018 0%, #1a1c14 30%, #1c1e16 50%, #181a12 80%);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;padding:6px 48px;height:100%;gap:12px;">

        <!-- Brand — stencil Courier -->
        <div style="display:flex;flex-direction:column;gap:1px;">
            <span style="
                font:800 14px/1 'Courier New',monospace;
                color:rgba(163,177,138,0.3);
                letter-spacing:0.15em;text-transform:uppercase;
            ">Counter</span>
            <span style="font:400 8px/1 'Courier New',monospace;color:rgba(163,177,138,0.12);letter-spacing:0.1em;">Event Accumulator</span>
        </div>

        <!-- Status LED -->
        <div style="display:flex;align-items:center;gap:3px;">
            <span class="led lg" id="${id}-led"></span>
        </div>

        <!-- Mechanical digit wheel display -->
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
            <div class="kosmos-wheel" id="${id}-wheel">
                <div class="kosmos-digit" id="${id}-d5">0</div>
                <div class="kosmos-digit" id="${id}-d4">0</div>
                <div class="kosmos-digit" id="${id}-d3">0</div>
                <div class="kosmos-digit" id="${id}-d2">0</div>
                <div class="kosmos-digit" id="${id}-d1">0</div>
                <div class="kosmos-digit" id="${id}-d0">0</div>
            </div>

            <!-- Reset button — chunky -->
            <button class="btn-stamp" id="${id}-btn-reset" style="
                padding:4px 8px;font-size:8px;
                background:linear-gradient(180deg, #5a5e4a, #484c3a);
                border-color:#383c2e;color:rgba(200,210,168,0.5);
            ">RST</button>
        </div>

        <!-- Model -->
        <span style="font:600 8px/1 'Courier New',monospace;color:rgba(163,177,138,0.1);letter-spacing:0.08em;">CT-01</span>
    </div>
</div>

<!-- ════════ BACK PANEL ════════ -->
<div class="rack-unit-back u2" data-unit-back="counter" data-id="${id}" style="
    background: linear-gradient(180deg, #1c1c1c, #181818);overflow:hidden;
">
    <div style="display:flex;align-items:center;padding:6px 48px;height:100%;gap:10px;">
        <span style="font:700 10px/1 'Courier New',monospace;color:rgba(163,177,138,0.12);letter-spacing:0.12em;text-transform:uppercase;">Counter</span>
        <span style="font:400 10px/1 'Courier New',monospace;color:rgba(255,255,255,0.06);">CT-01</span>
        <div class="patch-group" style="margin-left:10px;"><div class="patch-jack" data-input="trigger" data-unit-id="${id}"></div><div class="patch-jack-label">trigger</div></div>
        <div class="patch-group"><div class="patch-jack" data-input="data" data-unit-id="${id}"></div><div class="patch-jack-label">data</div></div>
        <div class="patch-group"><div class="patch-jack" data-output="count" data-unit-id="${id}"></div><div class="patch-jack-label">count</div></div>
        <div class="patch-group"><div class="patch-jack" data-output="thru" data-unit-id="${id}"></div><div class="patch-jack-label">thru</div></div>
        <div style="font:300 8px/1.6 'Courier New',monospace;color:rgba(163,177,138,0.04);margin-left:auto;text-align:right;">
            FORGERACK COUNTER &#x2022; CT-01<br>KOSMOS MFG
        </div>
    </div>
</div>
