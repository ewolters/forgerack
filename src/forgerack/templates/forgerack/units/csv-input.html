<!--
  CSV INPUT — Data Terminal
  Identity: Soviet-era data entry machine. Worn brushed steel.
  Stamped lettering. Recessed tape reader. Industrial toggle.
-->
<div class="rack-unit" data-unit="csv-input" style="
    --device-accent:#9ca3af;
    min-height:140px;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.003) 0px, transparent 1px, transparent 3px),
        linear-gradient(135deg, #131613 0%, #101310 40%, #121512 60%, #0e110e 100%);
    border:1px solid rgba(156,163,175,0.06);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.015), 0 2px 8px rgba(0,0,0,0.5);
">
    <span class="rack-screw tl"></span><span class="rack-screw tr"></span>
    <span class="rack-screw bl"></span><span class="rack-screw br"></span>

    <!-- Nameplate — stamped/engraved lettering -->
    <div style="
        display:flex;align-items:center;gap:8px;padding:4px 22px;
        border-bottom:2px solid rgba(0,0,0,0.3);
        background: linear-gradient(180deg, rgba(255,255,255,0.008), rgba(0,0,0,0.1));
    ">
        <span class="led" id="${id}-led"></span>
        <!-- Engraved brand -->
        <span style="
            font:800 10px/1 'Arial Narrow',Impact,'Inter',sans-serif;
            color:transparent;
            text-shadow: 0 1px 0 rgba(156,163,175,0.25), 0 -1px 0 rgba(0,0,0,0.6);
            -webkit-text-stroke: 0.3px rgba(156,163,175,0.15);
            letter-spacing:0.2em;text-transform:uppercase;
        ">CSV Input</span>
        <!-- Painted model number -->
        <span style="
            font:400 7px/1 'Courier New',monospace;
            color:rgba(200,180,140,0.2);
            letter-spacing:0.06em;
            margin-left:auto;
            /* worn paint effect */
            text-shadow: 0 0 2px rgba(200,180,140,0.05);
        ">MOD-DT01</span>
    </div>

    <div style="padding:6px 14px;display:flex;gap:10px;">
        <!-- Tape reader cutout — recessed instrument window -->
        <div style="
            flex:1;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(0,0,0,0.5);
            border-radius:2px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.01);
            padding:1px;
        ">
            <textarea id="${id}-data" rows="3" placeholder="paste data — csv, tsv, or one value per line"
                style="width:100%;height:100%;background:transparent;border:none;color:#6a7a6a;
                font:10px/1.3 'JetBrains Mono',monospace;padding:4px 6px;resize:none;outline:none;"></textarea>
        </div>

        <!-- Control cluster — recessed panel -->
        <div style="
            width:90px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.3);
            border-radius:2px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.01);
            padding:6px;
            display:flex;flex-direction:column;gap:4px;align-items:center;
        ">
            <!-- Row counter — recessed 7-segment window -->
            <div style="
                background:#050705;
                border:1px solid rgba(0,0,0,0.6);
                border-radius:1px;
                padding:2px 6px;
                box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
                text-align:center;width:100%;
            ">
                <div id="${id}-n" style="font:700 16px/1 'JetBrains Mono',monospace;color:#9ca3af;
                    text-shadow:0 0 6px rgba(156,163,175,0.12);">&#x2014;</div>
                <div style="font:700 5px/1 'Arial',sans-serif;color:rgba(156,163,175,0.2);
                    text-transform:uppercase;letter-spacing:0.2em;margin-top:2px;">ROWS</div>
            </div>

            <!-- Buttons — industrial toggles -->
            <button onclick="ForgeRack.units['${id}'].parse()" style="
                width:100%;padding:4px 0;
                font:700 7px/1 'Arial',sans-serif;text-transform:uppercase;letter-spacing:0.12em;
                background:linear-gradient(180deg, rgba(156,163,175,0.1), rgba(156,163,175,0.04));
                border:1px solid rgba(156,163,175,0.12);
                color:#9ca3af;border-radius:1px;cursor:pointer;
                box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            ">&#x25B6; Parse</button>
            <button onclick="ForgeRack.units['${id}'].demo()" style="
                width:100%;padding:3px 0;
                font:600 6px/1 'Arial',sans-serif;text-transform:uppercase;letter-spacing:0.1em;
                background:transparent;
                border:1px solid rgba(156,163,175,0.06);
                color:rgba(156,163,175,0.3);border-radius:1px;cursor:pointer;
            ">Load Demo</button>
        </div>
    </div>

    <!-- Column chips -->
    <div id="${id}-cols" style="display:none;padding:0 14px 4px;"></div>

    <!-- Jack bar — recessed bottom strip with wear marks -->
    <div style="
        display:flex;align-items:center;gap:6px;padding:4px 22px;
        background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.08));
        border-top:1px solid rgba(0,0,0,0.3);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.008);
    ">
        <!-- Stamped label -->
        <span style="font:700 6px/1 'Arial',sans-serif;color:rgba(156,163,175,0.15);text-transform:uppercase;letter-spacing:0.2em;">Output</span>
        <div id="${id}-jacks" style="display:flex;gap:6px;margin-left:4px;"></div>
    </div>
</div>
