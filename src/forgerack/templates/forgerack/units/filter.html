<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  SIEVE FG-02 — Multi-Column Conditional Gate                ║
 ║  Manufacturer: FORGERACK / SVEND MFG                        ║
 ║  Identity: Anodized cyan test instrument. Keysight lineage.  ║
 ║  Build up a filter stack. CRT shows active filters.          ║
 ║  Digital readout shows surviving row count.                  ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<div class="rack-unit-front u5 mfr-keysight" data-unit="filter" data-id="${id}" style="
    --device-accent:#22d3ee;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.003) 0px, transparent 1px, transparent 3px),
        linear-gradient(160deg, #0d1314 0%, #0b1011 30%, #0c1112 50%, #0a0f10 80%);
    overflow:hidden;
">
    <!-- Nameplate -->
    <div style="
        display:flex;align-items:center;gap:8px;
        padding:4px 48px;
        border-bottom:2px solid rgba(0,0,0,0.3);
        background: linear-gradient(180deg, rgba(34,211,238,0.008), rgba(0,0,0,0.1));
    ">
        <div class="led-housing">
            <span class="led" id="${id}-led" style="width:6px;height:6px;"></span>
        </div>
        <span style="
            font:700 22px/1 'Helvetica Neue','Arial',sans-serif;
            color:transparent;
            text-shadow: 0 1px 0 rgba(34,211,238,0.35), 0 -1px 0 rgba(0,0,0,0.6);
            -webkit-text-stroke: 0.4px rgba(34,211,238,0.18);
            letter-spacing:0.15em;text-transform:uppercase;
        ">Sieve</span>
        <span style="font:300 10px/1 'Helvetica Neue',sans-serif;color:rgba(34,211,238,0.15);letter-spacing:0.06em;">Multi-Column Gate</span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
            <div style="width:16px;height:4px;background:rgba(34,211,238,0.06);border-radius:2px;"></div>
            <span style="font:500 10px/1 'Courier New',monospace;color:rgba(200,180,140,0.18);letter-spacing:0.06em;">FG-02</span>
        </div>
    </div>

    <div style="padding:6px 48px;display:flex;gap:10px;height:calc(100% - 36px);">

        <!-- ── LEFT: Filter builder + CRT ── -->
        <div style="flex:1;display:flex;flex-direction:column;gap:5px;">

            <!-- Filter builder strip -->
            <div style="display:flex;gap:6px;align-items:center;">
                <!-- Column -->
                <div class="panel-recessed" style="padding:4px 6px;display:flex;flex-direction:column;gap:2px;align-items:center;">
                    <div style="font:700 8px/1 'Helvetica Neue',sans-serif;color:rgba(34,211,238,0.2);text-transform:uppercase;letter-spacing:0.15em;">Col</div>
                    <select id="${id}-col-select" style="
                        background:#0a1214;border:1px solid rgba(34,211,238,0.2);
                        color:#b0e0f0;padding:3px 5px;border-radius:1px;
                        font:10px/1 'JetBrains Mono',monospace;min-width:60px;
                    ">
                        <option value="">—</option>
                    </select>
                </div>

                <!-- Mode -->
                <div class="panel-recessed" style="padding:4px 6px;display:flex;flex-direction:column;gap:2px;align-items:center;">
                    <div style="font:700 8px/1 'Helvetica Neue',sans-serif;color:rgba(34,211,238,0.2);text-transform:uppercase;letter-spacing:0.15em;">Mode</div>
                    <div class="segment" id="${id}-mode-seg" style="border-color:rgba(34,211,238,0.08);">
                        <button class="segment-btn active" data-sieve-mode=">" style="font:800 12px/1 'JetBrains Mono',monospace;padding:3px 5px;color:rgba(34,211,238,0.5);">&#x003E;</button>
                        <button class="segment-btn" data-sieve-mode="<" style="font:800 12px/1 'JetBrains Mono',monospace;padding:3px 5px;">&#x003C;</button>
                        <button class="segment-btn" data-sieve-mode="=" style="font:800 12px/1 'JetBrains Mono',monospace;padding:3px 5px;">&#x003D;</button>
                        <button class="segment-btn" data-sieve-mode="≠" style="font:800 12px/1 'JetBrains Mono',monospace;padding:3px 5px;">&#x2260;</button>
                    </div>
                </div>

                <!-- Value — numeric input OR factor dropdown -->
                <div class="panel-recessed" style="padding:4px 6px;display:flex;flex-direction:column;gap:2px;align-items:center;">
                    <div style="font:700 8px/1 'Helvetica Neue',sans-serif;color:rgba(34,211,238,0.2);text-transform:uppercase;letter-spacing:0.15em;">Value</div>
                    <input type="text" id="${id}-threshold" value="0" style="
                        width:70px;background:rgba(0,0,0,0.5);border:1px solid rgba(34,211,238,0.12);
                        color:#22d3ee;padding:2px 5px;border-radius:1px;text-align:center;
                        font:700 11px/1 'JetBrains Mono',monospace;
                        box-shadow:inset 0 1px 3px rgba(0,0,0,0.4);
                    ">
                    <select id="${id}-factor-select" style="
                        display:none;width:70px;
                        background:#0a1214;border:1px solid rgba(34,211,238,0.2);
                        color:#b0e0f0;padding:3px 5px;border-radius:1px;
                        font:10px/1 'JetBrains Mono',monospace;
                    "></select>
                </div>

                <!-- Add button -->
                <button id="${id}-btn-add" style="
                    padding:4px 10px;font:800 9px/1 'Arial',sans-serif;text-transform:uppercase;letter-spacing:0.1em;
                    background:linear-gradient(180deg, rgba(34,211,238,0.15), rgba(34,211,238,0.05));
                    border:1px solid rgba(34,211,238,0.2);color:rgba(34,211,238,0.6);
                    border-radius:1px;cursor:pointer;align-self:flex-end;
                    box-shadow:0 1px 2px rgba(0,0,0,0.3);transition:transform 0.05s;
                " onmousedown="this.style.transform='translateY(1px)'" onmouseup="this.style.transform=''">+ Add</button>

                <!-- Clear all -->
                <button id="${id}-btn-clear" class="btn-ghost" style="align-self:flex-end;font-size:7px;padding:4px 6px;color:rgba(34,211,238,0.2);border-color:rgba(34,211,238,0.08);">Clear</button>
            </div>

            <!-- Filter list CRT -->
            <div style="flex:1;min-height:0;
                background:rgba(0,0,0,0.3);border:1px solid rgba(0,0,0,0.5);border-radius:2px;
                box-shadow:inset 0 2px 6px rgba(0,0,0,0.4);
                position:relative;overflow:hidden;
            ">
                <div class="crt-scanlines"></div>
                <div style="position:absolute;inset:0;
                    background:radial-gradient(ellipse at center, rgba(34,211,238,0.01), transparent 80%);
                    pointer-events:none;z-index:2;"></div>
                <div style="position:absolute;inset:0;box-shadow:inset 0 0 15px rgba(0,0,0,0.3);pointer-events:none;z-index:3;"></div>

                <div id="${id}-filter-list" style="
                    height:100%;overflow-y:auto;padding:5px 8px;
                    font:11px/1.6 'JetBrains Mono',monospace;
                    color:rgba(34,211,238,0.35);
                    position:relative;z-index:1;
                "><span style="color:rgba(34,211,238,0.1);">no filters — all rows pass</span></div>
            </div>
        </div>

        <!-- ── RIGHT: LCD displays (calculator/multimeter style) ── -->
        <div style="width:86px;display:flex;flex-direction:column;gap:3px;">
            <!-- Pass rate meter -->
            <div style="
                background:rgba(0,0,0,0.3);border:1px solid rgba(0,0,0,0.5);border-radius:2px;
                height:6px;overflow:hidden;
            ">
                <div id="${id}-pass-meter" style="height:100%;width:100%;background:#22c55e;border-radius:1px;transition:width 0.3s;"></div>
            </div>

            <!-- Rows remaining -->
            <div style="text-align:center;">
                <div style="
                    background:linear-gradient(180deg, #9aaa8a, #8a9a7a);
                    border:2px solid #2a2a2a;border-radius:2px;
                    box-shadow:inset 0 1px 3px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.03);
                    padding:4px 3px;text-align:right;
                    position:relative;overflow:hidden;
                ">
                    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent 40%,rgba(0,0,0,0.04));pointer-events:none;"></div>
                    <div style="position:relative;">
                        <div style="font:700 22px/1 'JetBrains Mono',monospace;color:rgba(40,50,35,0.08);letter-spacing:0.06em;padding-right:3px;">8888</div>
                        <div id="${id}-rows-out" style="font:700 22px/1 'JetBrains Mono',monospace;color:#0a1208;letter-spacing:0.06em;
                            position:absolute;inset:0;text-align:right;padding-right:3px;">—</div>
                    </div>
                </div>
                <div style="font:600 8px/1 'Arial',sans-serif;color:rgba(34,211,238,0.6);
                    text-transform:uppercase;letter-spacing:0.12em;margin-top:3px;">Rows</div>

            </div>

            <!-- Pass -->
            <div style="text-align:center;">
                <div style="
                    background:linear-gradient(180deg, #9aaa8a, #8a9a7a);
                    border:2px solid #2a2a2a;border-radius:2px;
                    box-shadow:inset 0 1px 3px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.03);
                    padding:3px 3px;text-align:right;
                    position:relative;overflow:hidden;
                ">
                    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent 40%,rgba(0,0,0,0.04));pointer-events:none;"></div>
                    <div style="position:relative;">
                        <div style="font:700 18px/1 'JetBrains Mono',monospace;color:rgba(40,50,35,0.08);letter-spacing:0.06em;padding-right:3px;">8888</div>
                        <div id="${id}-pass" style="font:700 18px/1 'JetBrains Mono',monospace;color:#1a3518;letter-spacing:0.06em;
                            position:absolute;inset:0;text-align:right;padding-right:3px;">—</div>
                    </div>
                </div>
                <div style="font:600 8px/1 'Arial',sans-serif;color:rgba(34,197,94,0.5);
                    text-transform:uppercase;letter-spacing:0.12em;margin-top:2px;">Pass</div>
            </div>

            <!-- Reject -->
            <div style="text-align:center;">
                <div style="
                    background:linear-gradient(180deg, #9aaa8a, #8a9a7a);
                    border:2px solid #2a2a2a;border-radius:2px;
                    box-shadow:inset 0 1px 3px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.03);
                    padding:3px 3px;text-align:right;
                    position:relative;overflow:hidden;
                ">
                    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent 40%,rgba(0,0,0,0.04));pointer-events:none;"></div>
                    <div style="position:relative;">
                        <div style="font:700 18px/1 'JetBrains Mono',monospace;color:rgba(40,50,35,0.08);letter-spacing:0.06em;padding-right:3px;">8888</div>
                        <div id="${id}-reject" style="font:700 18px/1 'JetBrains Mono',monospace;color:#3a1818;letter-spacing:0.06em;
                            position:absolute;inset:0;text-align:right;padding-right:3px;">—</div>
                    </div>
                </div>
                <div style="font:600 8px/1 'Arial',sans-serif;color:rgba(239,68,68,0.5);
                    text-transform:uppercase;letter-spacing:0.12em;margin-top:2px;">Reject</div>
            </div>

            <!-- Filter count -->
            <div style="text-align:center;margin-top:auto;">
                <div style="
                    background:linear-gradient(180deg, #9aaa8a, #8a9a7a);
                    border:2px solid #2a2a2a;border-radius:2px;
                    box-shadow:inset 0 1px 3px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.03);
                    padding:2px 3px;text-align:right;
                    position:relative;overflow:hidden;
                ">
                    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent 40%,rgba(0,0,0,0.04));pointer-events:none;"></div>
                    <div style="position:relative;">
                        <div style="font:700 14px/1 'JetBrains Mono',monospace;color:rgba(40,50,35,0.08);letter-spacing:0.06em;padding-right:3px;">88</div>
                        <div id="${id}-filter-count" style="font:700 14px/1 'JetBrains Mono',monospace;color:#0a1208;letter-spacing:0.06em;
                            position:absolute;inset:0;text-align:right;padding-right:3px;">0</div>
                    </div>
                </div>
                <div style="font:600 7px/1 'Arial',sans-serif;color:rgba(34,211,238,0.6);
                    text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;">Filters</div>
            </div>
        </div>
    </div>
</div>

<div class="rack-unit-back u5" data-unit-back="filter" data-id="${id}" style="
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.005) 0px, transparent 1px, transparent 2px),
        linear-gradient(160deg, #1c1c1c, #1f1f1f 40%, #1d1d1d);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 48px;border-bottom:1px solid rgba(255,255,255,0.05);">
        <span style="font:700 11px/1 'Helvetica Neue',sans-serif;color:rgba(255,255,255,0.1);letter-spacing:0.12em;text-transform:uppercase;">Sieve</span>
        <span style="font:400 11px/1 'Courier New',monospace;color:rgba(255,255,255,0.06);">FG-02</span>
        <span style="font:400 6px/1 'Courier New',monospace;color:rgba(255,255,255,0.04);margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 48px;">
        <div style="font:700 10px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:10px;">Signal</div>
        <div style="display:flex;gap:18px;">
            <div class="patch-group"><div class="patch-jack" data-input="data" data-unit-id="${id}"></div><div class="patch-jack-label">data in</div></div>
            <div class="patch-group"><div class="patch-jack" data-output="pass" data-unit-id="${id}"></div><div class="patch-jack-label">pass</div></div>
            <div class="patch-group"><div class="patch-jack" data-output="reject" data-unit-id="${id}"></div><div class="patch-jack-label">reject</div></div>
        </div>
    </div>
    <div style="padding:6px 48px;margin-top:auto;border-top:1px solid rgba(34,211,238,0.02);">
        <div style="font:400 7px/1 'Courier New',monospace;color:rgba(34,211,238,0.04);letter-spacing:0.04em;line-height:1.8;">
            FORGERACK SIEVE &#x2022; MODEL FG-02 REV.A &#x2022; MULTI-COLUMN GATE<br>
            MODES: GT LT EQ NE &#x2022; FILTER STACK &#x2022; AND LOGIC &#x2022; SVEND MFG
        </div>
    </div>
</div>
