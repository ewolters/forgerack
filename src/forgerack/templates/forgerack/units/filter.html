<!--
  FILTER — Conditional Gate
  Identity: Precision instrument. Passes data that meets a condition.
  Like a frequency filter in audio — cutoff, resonance, pass type.
  Color: cyan (#22d3ee)
  Size: 2U
-->
<div class="rack-unit u2" data-unit="filter" style="
    --device-accent:#22d3ee;
    --device-accent-dim:rgba(34,211,238,0.1);
    --device-accent-glow:rgba(34,211,238,0.1);
    background: linear-gradient(180deg, #0c1214, #090d0f);
    border-color: rgba(34,211,238,0.06);
">
    <span class="rack-screw tl"></span><span class="rack-screw tr"></span>
    <span class="rack-screw bl"></span><span class="rack-screw br"></span>

    <div style="display:flex;align-items:center;gap:6px;padding:3px 20px;border-bottom:1px solid rgba(34,211,238,0.05);background:rgba(0,0,0,0.15);">
        <span class="led" id="${id}-led"></span>
        <span style="font:700 9px/1 'Inter',sans-serif;color:#22d3ee;letter-spacing:0.12em;text-transform:uppercase;">Filter</span>
        <span style="font:400 7px/1 'Inter',sans-serif;color:rgba(34,211,238,0.25);margin-left:auto;">GATE</span>
    </div>

    <div style="padding:6px 12px;display:flex;gap:10px;align-items:flex-start;">
        <!-- Mode selector -->
        <div style="display:flex;flex-direction:column;gap:4px;">
            <div class="segment" style="border-color:rgba(34,211,238,0.08);">
                <button class="segment-btn active" style="font-size:7px;padding:2px 6px;">&#x003E;</button>
                <button class="segment-btn" style="font-size:7px;padding:2px 6px;">&#x003C;</button>
                <button class="segment-btn" style="font-size:7px;padding:2px 6px;">&#x003D;</button>
                <button class="segment-btn" style="font-size:7px;padding:2px 6px;">&#x2260;</button>
            </div>
            <span style="font:600 6px/1 'JetBrains Mono',monospace;color:rgba(34,211,238,0.2);text-transform:uppercase;text-align:center;">mode</span>
        </div>

        <!-- Threshold dial -->
        <div class="dial" data-dial='{"min":-100,"max":100,"value":0,"step":0.1}'>
            <div class="dial-knob" style="width:28px;height:28px;"></div>
            <div class="dial-value" style="color:#22d3ee;">0.0</div>
            <div class="dial-label" style="color:rgba(34,211,238,0.3);">threshold</div>
        </div>

        <!-- Pass/reject counters -->
        <div style="display:flex;gap:8px;margin-left:auto;">
            <div class="readout sm">
                <div class="readout-value good" id="${id}-pass" style="font-size:11px;color:#22c55e;">—</div>
                <div class="readout-label" style="color:rgba(34,197,94,0.3);">pass</div>
            </div>
            <div class="readout sm">
                <div class="readout-value bad" id="${id}-reject" style="font-size:11px;color:#ef4444;">—</div>
                <div class="readout-label" style="color:rgba(239,68,68,0.3);">reject</div>
            </div>
        </div>
    </div>

    <div style="display:flex;align-items:center;gap:6px;padding:4px 20px;background:rgba(0,0,0,0.1);
        border-top:1px solid rgba(34,211,238,0.04);font:600 7px/1 'JetBrains Mono',monospace;
        color:rgba(34,211,238,0.2);text-transform:uppercase;letter-spacing:0.1em;">
        <span>in</span>
        <div class="jack" data-input="signal" id="${id}-in"></div>
        <span style="color:rgba(34,211,238,0.1);margin:0 4px;">&#x2192;</span>
        <div class="jack" data-output="pass" id="${id}-out-pass"></div>
        <span>pass</span>
        <div class="jack" data-output="reject" id="${id}-out-reject" style="margin-left:6px;"></div>
        <span>reject</span>
    </div>
</div>
