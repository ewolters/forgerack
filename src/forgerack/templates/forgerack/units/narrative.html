<!--
  NARRATIVE — Text Output Panel
  Identity: Typewriter / teletype. Green-on-black monospaced text output.
  The interpretation — what the numbers mean in words.
  Color: terminal green (#22c55e on black)
  Size: 2U
-->
<div class="rack-unit u2" data-unit="narrative" style="
    --device-accent:#22c55e;
    --device-accent-dim:rgba(34,197,94,0.08);
    background: #080a08;
    border-color: rgba(34,197,94,0.06);
">
    <span class="rack-screw tl"></span><span class="rack-screw tr"></span>
    <span class="rack-screw bl"></span><span class="rack-screw br"></span>

    <div style="display:flex;align-items:center;gap:6px;padding:3px 20px;border-bottom:1px solid rgba(34,197,94,0.04);background:rgba(0,0,0,0.2);">
        <span class="led" id="${id}-led"></span>
        <span style="font:700 9px/1 'Courier New',monospace;color:#22c55e;letter-spacing:0.1em;text-transform:uppercase;">Narrative</span>
        <span style="font:400 7px/1 'Courier New',monospace;color:rgba(34,197,94,0.2);margin-left:auto;">TELETYPE</span>
    </div>

    <!-- Terminal screen -->
    <div style="margin:4px 10px;padding:6px 8px;background:#040604;border:1px solid rgba(34,197,94,0.04);
        border-radius:1px;height:calc(100% - 60px);overflow-y:auto;box-shadow:inset 0 1px 4px rgba(0,0,0,0.5);
        position:relative;">
        <!-- Scanline overlay -->
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0px,rgba(0,0,0,0.04) 1px,transparent 2px);pointer-events:none;"></div>

        <div id="${id}-text" style="font:11px/1.5 'JetBrains Mono',monospace;color:rgba(34,197,94,0.6);white-space:pre-wrap;position:relative;">
            <span style="color:rgba(34,197,94,0.2);">&#x25A0; awaiting input</span>
        </div>
    </div>

    <div style="display:flex;align-items:center;gap:6px;padding:4px 20px;background:rgba(0,0,0,0.12);
        border-top:1px solid rgba(34,197,94,0.03);font:600 7px/1 'JetBrains Mono',monospace;
        color:rgba(34,197,94,0.15);text-transform:uppercase;letter-spacing:0.1em;">
        <span>in</span>
        <div class="jack" data-input="text" id="${id}-in"></div>
    </div>
</div>
