<!--
  NARRATIVE — Teletype Output
  Identity: 1970s teletype / line printer. Green phosphor on black.
  Paper-feed texture. Mechanical typewriter character.
  FRONT: Terminal screen with scanlines
  BACK: Text input jack
-->
<div class="rack-unit-front u4" data-unit="narrative" data-id="${id}" data-u="3" style="
    --device-accent:#22c55e;
    ;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.002) 0px, transparent 1px, transparent 4px),
        linear-gradient(135deg, #080a08 0%, #060806 40%, #070907 60%, #050705 100%);
    
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.006), 0 3px 10px rgba(0,0,0,0.6);
">
    <!-- Nameplate — typewriter branding -->
    <div style="
        display:flex;align-items:center;gap:8px;padding:3px 22px;
        border-bottom:1px solid rgba(34,197,94,0.03);
        background: rgba(0,0,0,0.15);
    ">
        <span class="led" id="${id}-led"></span>
        <span style="
            font:700 10px/1 'Courier New','Courier',monospace;
            color:rgba(34,197,94,0.25);letter-spacing:0.08em;text-transform:uppercase;
        ">HERALD</span>
        <span style="
            font:400 7px/1 'Courier New',monospace;
            color:rgba(200,180,140,0.1);margin-left:auto;
        ">TT-01 HERALD</span>
    </div>

    <!-- Terminal screen — deep recess with CRT character -->
    <div style="
        margin:6px 12px;
        padding:3px;
        background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.15));
        border-radius:2px;
        box-shadow: inset 0 1px 0 rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.008);
    ">
        <div style="
            background:#020402;
            
            border-radius:1px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
            padding:6px 8px;
            height:120px;
            overflow-y:auto;
            position:relative;
        ">
            <!-- Scanlines -->
            <div style="position:absolute;inset:0;
                background:repeating-linear-gradient(0deg, transparent 0px, rgba(0,0,0,0.05) 1px, transparent 2px);
                pointer-events:none;"></div>
            <!-- Phosphor vignette -->
            <div style="position:absolute;inset:0;
                background:radial-gradient(ellipse at center, rgba(34,197,94,0.015), rgba(0,0,0,0.1) 80%);
                pointer-events:none;"></div>

            <div id="${id}-text" style="
                font:11px/1.5 'JetBrains Mono','Courier New',monospace;
                color:rgba(34,197,94,0.55);
                white-space:pre-wrap;
                position:relative;
            "><span style="color:rgba(34,197,94,0.15);">&#x25A0; awaiting input_</span></div>
        </div>
    </div>
</div>

<div class="rack-unit-back u4" data-unit-back="narrative" data-id="${id}" data-u="3" style="
    ;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,0.004) 0px, transparent 1px, transparent 2px),
        linear-gradient(135deg, #1b1b1b, #1e1e1e 40%, #1c1c1c);
    
">
    <div style="display:flex;align-items:center;gap:8px;padding:4px 22px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <span style="font:700 8px/1 'Courier New',monospace;color:rgba(255,255,255,0.1);letter-spacing:0.1em;text-transform:uppercase;">HERALD TT-01</span>
        <span style="font:400 6px/1 'Courier New',monospace;color:rgba(255,255,255,0.05);margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 22px;">
        <div style="font:700 6px/1 'Arial',sans-serif;color:rgba(255,255,255,0.08);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px;">Text Input</div>
        <div style="display:flex;gap:16px;">
            <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">text</div></div>
            <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">summary</div></div>
        </div>
    </div>
    <div style="padding:4px 22px;margin-top:auto;font:400 6px/1 'Courier New',monospace;color:rgba(34,197,94,0.04);">
        FORGERACK HERALD &#x2022; TT-01 REV.A &#x2022; 132 COL &#x2022; SVEND MFG
    </div>
</div>
