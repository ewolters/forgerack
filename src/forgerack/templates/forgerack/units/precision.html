        <div style="border:1px solid rgba(107,142,107,0.2);border-radius:3px;

<!-- ════════ BACK PANEL ════════ -->
<div class="rack-unit-back u8" data-unit-back="precision" data-id="${id}" style="
    background: linear-gradient(160deg, #1c1c1c, #1f1f1f 40%, #1d1d1d);overflow:hidden;position:relative;
">
