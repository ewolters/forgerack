<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  PROBE PR-01 — Spot-Check Multimeter                         ║
 ║  Manufacturer: FLUKE                                         ║
 ║  Identity: Bright yellow rubber armor, LCD readout, rotary   ║
 ║  selector. Banana jacks. The fastest way to read one stat    ║
 ║  from one column. Clip it on, read the number.               ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<!-- ════════ FRONT PANEL ════════ -->
<div class="rack-unit-front u3 mfr-fluke" data-unit="probe" data-id="${id}" style="
    --device-accent:#f59e0b;
    background: linear-gradient(160deg, #1a1a1a 0%, #222 30%, #1e1e1e 50%, #181818 80%);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;padding:0 48px;height:100%;gap:0;">

        <!-- Yellow rubber armor housing — left grip -->
        <div class="fluke-armor" style="
            display:flex;align-items:center;gap:10px;
            padding:10px 14px;flex:1;height:104px;
        ">
            <!-- Rotary selector — the big dial -->
            <div style="position:relative;flex-shrink:0;margin:0 16px;">
                <div class="fluke-selector" id="${id}-selector" style="width:52px;height:52px;">
                </div>
                <!-- Ring labels — 8 positions around the dial -->
                <span style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.55);text-transform:uppercase;">Mean</span>
                <span style="position:absolute;top:4px;right:-18px;font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.45);text-transform:uppercase;">Med</span>
                <span style="position:absolute;top:24px;right:-16px;font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.45);text-transform:uppercase;">Std</span>
                <span style="position:absolute;bottom:2px;right:-16px;font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.45);text-transform:uppercase;">Min</span>
                <span style="position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.45);text-transform:uppercase;">Max</span>
                <span style="position:absolute;bottom:2px;left:-18px;font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.45);text-transform:uppercase;">Rng</span>
                <span style="position:absolute;top:24px;left:-10px;font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.45);text-transform:uppercase;">n</span>
                <span style="position:absolute;top:4px;left:-18px;font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.45);text-transform:uppercase;">Sum</span>
            </div>

            <!-- LCD display -->
            <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
                <!-- Column selector -->
                <div style="display:flex;gap:4px;align-items:center;">
                    <select id="${id}-col" style="
                        flex:1;background:#1a1400;border:1px solid rgba(245,158,11,0.3);
                        color:#f59e0b;padding:3px 5px;border-radius:1px;
                        font:10px/1 'JetBrains Mono',monospace;
                    ">
                        <option value="">column</option>
                    </select>
                    <span class="led" id="${id}-led" style="width:5px;height:5px;"></span>
                </div>
                <!-- Main LCD readout -->
                <div class="fluke-lcd" style="padding:8px 10px;">
                    <div class="fluke-lcd-ghost" style="font-size:28px;">888.888</div>
                    <div class="fluke-lcd-value" id="${id}-value" style="font-size:28px;">—</div>
                </div>
                <!-- Stat label under LCD -->
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span id="${id}-stat-label" style="font:700 8px/1 'Arial',sans-serif;color:rgba(20,10,0,0.5);text-transform:uppercase;letter-spacing:0.1em;">MEAN</span>
                    <span id="${id}-unit-label" style="font:600 7px/1 'Arial',sans-serif;color:rgba(20,10,0,0.35);">AUTO</span>
                </div>
            </div>
        </div>

        <!-- Right side — dark panel with model info -->
        <div style="width:90px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0 8px;">
            <!-- Brand -->
            <div style="display:flex;flex-direction:column;align-items:center;">
                <span style="font:900 11px/1 'Arial',sans-serif;color:rgba(245,158,11,0.25);letter-spacing:0.15em;text-transform:uppercase;">Probe</span>
                <span style="font:300 8px/1 'Arial',sans-serif;color:rgba(245,158,11,0.1);font-style:italic;">Spot Check</span>
            </div>
            <!-- Banana jack indicators -->
            <div style="display:flex;gap:6px;">
                <div class="banana-post red"><div class="banana-post-ring"></div><div class="banana-post-hole"></div></div>
                <div class="banana-post black"><div class="banana-post-ring"></div><div class="banana-post-hole"></div></div>
            </div>
            <span style="font:500 8px/1 'Courier New',monospace;color:rgba(245,158,11,0.1);">PR-01</span>
        </div>
    </div>
</div>

<!-- ════════ BACK PANEL ════════ -->
<div class="rack-unit-back u3" data-unit-back="probe" data-id="${id}" style="
    background: linear-gradient(180deg, #1c1c1c, #181818);overflow:hidden;
">
    <div style="display:flex;align-items:center;padding:6px 48px;height:100%;gap:10px;">
        <span style="font:700 10px/1 'Arial',sans-serif;color:rgba(245,158,11,0.12);letter-spacing:0.12em;text-transform:uppercase;">Probe</span>
        <span style="font:400 10px/1 'Courier New',monospace;color:rgba(255,255,255,0.06);">PR-01</span>
        <div class="patch-group" style="margin-left:10px;"><div class="patch-jack" data-input="data" data-unit-id="${id}"></div><div class="patch-jack-label">data</div></div>
        <div class="patch-group"><div class="patch-jack" data-output="thru" data-unit-id="${id}"></div><div class="patch-jack-label">thru</div></div>
        <div style="font:300 5px/1.6 'Courier New',monospace;color:rgba(245,158,11,0.04);margin-left:auto;text-align:right;">
            FORGERACK PROBE &#x2022; PR-01 REV.A<br>SPOT-CHECK MULTIMETER &#x2022; FLUKE MFG
        </div>
    </div>
</div>
