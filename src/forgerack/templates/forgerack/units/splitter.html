<!--
  SPLITTER — Signal Fan-out
  Identity: Simple passive device. Brushed aluminum faceplate.
  Like a headphone splitter or terminal strip. Wear around the jacks.
-->
<div class="rack-unit" data-unit="splitter" style="
    --device-accent:#64748b;
    min-height:52px;
    background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.004) 0px, transparent 1px, transparent 4px),
        linear-gradient(180deg, #141714, #101310);
    border:1px solid rgba(100,116,139,0.06);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.01), 0 2px 6px rgba(0,0,0,0.4);
">
    <span class="rack-screw tl"></span><span class="rack-screw tr"></span>

    <div style="display:flex;align-items:center;padding:4px 22px;height:100%;gap:10px;">
        <!-- Engraved label — like stamped into metal -->
        <span style="
            font:800 8px/1 'Arial Narrow',Impact,sans-serif;
            color:transparent;
            text-shadow: 0 1px 0 rgba(100,116,139,0.2), 0 -1px 0 rgba(0,0,0,0.5);
            -webkit-text-stroke: 0.3px rgba(100,116,139,0.12);
            letter-spacing:0.25em;text-transform:uppercase;
        ">SPLIT</span>

        <!-- Input jack — in recessed ring -->
        <div style="
            display:flex;align-items:center;gap:3px;
            padding:3px 6px;
            background:rgba(0,0,0,0.2);
            border:1px solid rgba(0,0,0,0.3);
            border-radius:10px;
            box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);
        ">
            <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.2);text-transform:uppercase;letter-spacing:0.15em;">IN</span>
            <div class="jack" data-input="signal" id="${id}-in"></div>
        </div>

        <!-- Arrow — etched -->
        <span style="color:rgba(100,116,139,0.1);font-size:14px;">&#x25B8;&#x25B8;</span>

        <!-- Output jacks — each in worn ring -->
        <div style="display:flex;gap:8px;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
                <div class="jack" data-output="a" id="${id}-a"></div>
                <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.15);letter-spacing:0.1em;">A</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
                <div class="jack" data-output="b" id="${id}-b"></div>
                <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.15);letter-spacing:0.1em;">B</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
                <div class="jack" data-output="c" id="${id}-c"></div>
                <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.15);letter-spacing:0.1em;">C</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
                <div class="jack" data-output="d" id="${id}-d"></div>
                <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.15);letter-spacing:0.1em;">D</span>
            </div>
        </div>

        <!-- Painted model -->
        <span style="font:400 6px/1 'Courier New',monospace;color:rgba(200,180,140,0.12);margin-left:auto;letter-spacing:0.05em;">SP-04</span>
    </div>
</div>
