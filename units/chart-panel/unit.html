<!--
  CHART PANEL — LENS Universal Display
  Identity: Laboratory oscilloscope. Dark cavity, phosphor green scanlines.
  Beveled screen bezel. Chrome trim around viewport.
  FRONT: ForgeViz render target, no controls (pure display)
  BACK: Single input jack
-->
<div class="rack-unit-front" data-unit="chart-panel" data-id="${id}" data-u="4" style="
    --device-accent:#4ade80;
    min-height:232px;
    background:
        linear-gradient(135deg, #0a0d0a 0%, #080b08 40%, #090c09 60%, #070a07 100%);
    border:1px solid rgba(255,255,255,0.03);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.008), 0 3px 10px rgba(0,0,0,0.6);
">
    <!-- Nameplate — understated, the screen is the star -->
    <div style="
        display:flex;align-items:center;gap:8px;padding:3px 22px;
        border-bottom:1px solid rgba(255,255,255,0.02);
        background: rgba(0,0,0,0.15);
    ">
        <span class="led on-green" id="${id}-led" style="width:6px;height:6px;"></span>
        <span style="
            font:300 9px/1 'Helvetica Neue','Arial',sans-serif;
            color:rgba(255,255,255,0.12);letter-spacing:0.12em;text-transform:uppercase;
        ">Chart Panel</span>
        <span style="
            font:400 8px/1 'Courier New',monospace;
            color:rgba(200,180,140,0.08);margin-left:auto;
        ">LENS</span>
    </div>

    <!-- Screen bezel — beveled edge around the viewport -->
    <div style="
        margin:6px 12px;
        padding:3px;
        background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(0,0,0,0.2));
        border-radius:3px;
        box-shadow: 0 1px 0 rgba(255,255,255,0.02), inset 0 1px 0 rgba(0,0,0,0.3);
    ">
        <!-- Screen cavity -->
        <div style="
            background:#030503;
            border:1px solid rgba(0,0,0,0.8);
            border-radius:2px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
            position:relative;
            overflow:hidden;
        ">
            <!-- Phosphor scanlines -->
            <div style="position:absolute;inset:0;
                background:repeating-linear-gradient(0deg, transparent 0px, rgba(0,0,0,0.04) 1px, transparent 2px);
                pointer-events:none;z-index:1;"></div>
            <!-- Slight green phosphor tint -->
            <div style="position:absolute;inset:0;
                background:radial-gradient(ellipse at center, rgba(74,222,128,0.01), transparent 70%);
                pointer-events:none;z-index:1;"></div>

            <!-- ForgeViz render target -->
            <div id="${id}-viewport" style="height:190px;position:relative;">
                <div id="${id}-empty" style="display:flex;align-items:center;justify-content:center;height:100%;
                    font:300 11px/1 'Courier New',monospace;color:rgba(74,222,128,0.06);">
                    NO SIGNAL
                </div>
            </div>
        </div>
    </div>
</div>

<!-- BACK -->
<div class="rack-unit-back" data-unit-back="chart-panel" data-id="${id}" data-u="4" style="
    min-height:232px;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,0.004) 0px, transparent 1px, transparent 2px),
        linear-gradient(135deg, #1a1a1a, #1d1d1d 40%, #1b1b1b);
    border:1px solid rgba(255,255,255,0.03);
">
    <div style="display:flex;align-items:center;gap:8px;padding:4px 22px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(255,255,255,0.1);letter-spacing:0.15em;text-transform:uppercase;">LENS Display</span>
        <span style="font:400 6px/1 'Courier New',monospace;color:rgba(255,255,255,0.05);margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:12px 22px;">
        <div style="font:700 6px/1 'Arial',sans-serif;color:rgba(255,255,255,0.08);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px;">Signal Input</div>
        <div style="display:flex;gap:16px;">
            <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">chart</div></div>
            <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">aux</div></div>
        </div>
    </div>
    <div style="padding:4px 22px;margin-top:auto;font:400 6px/1 'Courier New',monospace;color:rgba(74,222,128,0.04);">
        FORGERACK UNIVERSAL DISPLAY &#x2022; LENS REV.B &#x2022; FORGEVIZ COMPATIBLE &#x2022; SVEND MFG
    </div>
</div>
