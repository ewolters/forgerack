<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  CRATE CM-01 — Equipment Transit Container                  ║
 ║  Identity: Pelican case / military transit container.        ║
 ║  Impact font. Olive drab undertone. Crosshatch texture.     ║
 ║  Latches, not buttons. Chunky. Built to survive a drop.     ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<div class="rack-unit-front u3 mfr-milspec" data-unit="combinator" data-id="${id}" style="
    --device-accent:#78716c;
    background:
        /* Matte olive — no specular, just flat military paint */
        linear-gradient(160deg, #141311 0%, #111010 30%, #131211 50%, #100f0e 80%);
    overflow:hidden;
">
    <!-- Nameplate — riveted equipment plate -->
    <div style="
        display:flex;align-items:center;gap:8px;
        padding:5px 48px;
        border-bottom:2px solid rgba(0,0,0,0.35);
        background: linear-gradient(180deg, rgba(255,255,255,0.006), rgba(0,0,0,0.1));
    ">
        <div style="width:12px;height:12px;border-radius:50%;background:rgba(0,0,0,0.3);
            box-shadow:inset 0 1px 2px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;">
            <span class="led on-amber" id="${id}-led" style="width:6px;height:6px;"></span>
        </div>
        <span style="
            font:900 17px/1 'Impact','Arial Black',sans-serif;
            color:transparent;
            text-shadow: 0 1px 0 rgba(120,113,108,0.35), 0 -1px 0 rgba(0,0,0,0.7);
            -webkit-text-stroke: 0.4px rgba(120,113,108,0.15);
            letter-spacing:0.12em;text-transform:uppercase;
        ">Crate</span>
        <span id="${id}-name" style="font:400 11px/1 'Courier New',monospace;color:rgba(120,113,108,0.2);">untitled</span>
        <button onclick="ForgeRack.units['${id}']&&ForgeRack.units['${id}'].toggle()"
            class="btn-tactical" style="margin-left:auto;"
            id="${id}-toggleBtn">&#x25BC; Open</button>
        <span style="font:500 10px/1 'Courier New',monospace;color:rgba(200,180,140,0.15);">CM-01</span>
    </div>

    <!-- Macro knobs in recessed cutout -->
    <div style="
        margin:6px 48px;padding:8px 14px;
        background:rgba(0,0,0,0.22);border:1px solid rgba(0,0,0,0.35);border-radius:2px;
        box-shadow:inset 0 2px 4px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.005);
        display:flex;gap:18px;align-items:center;
    ">
        <div class="dial sm" data-dial='{"min":0,"max":100,"value":50}'>
            <div class="dial-knob" style="width:26px;height:26px;"></div>
            <div class="dial-label" style="color:rgba(120,113,108,0.2);font-size:7px;">macro 1</div>
        </div>
        <div class="dial sm" data-dial='{"min":0,"max":100,"value":50}'>
            <div class="dial-knob" style="width:26px;height:26px;"></div>
            <div class="dial-label" style="color:rgba(120,113,108,0.2);font-size:7px;">macro 2</div>
        </div>
        <div class="dial sm" data-dial='{"min":0,"max":100,"value":50}'>
            <div class="dial-knob" style="width:26px;height:26px;"></div>
            <div class="dial-label" style="color:rgba(120,113,108,0.2);font-size:7px;">macro 3</div>
        </div>
        <div class="dial sm" data-dial='{"min":0,"max":100,"value":50}'>
            <div class="dial-knob" style="width:26px;height:26px;"></div>
            <div class="dial-label" style="color:rgba(120,113,108,0.2);font-size:7px;">macro 4</div>
        </div>
    </div>

    <!-- Contained units (hidden when collapsed) -->
    <div id="${id}-body" style="display:none;margin:0 48px 6px;border-top:1px dashed rgba(120,113,108,0.06);
        padding:6px;background:rgba(0,0,0,0.08);border-radius:0 0 2px 2px;">
        <div style="font:300 13px/1 'Courier New',monospace;color:rgba(120,113,108,0.08);text-align:center;padding:16px;">
            Drop units here to combine
        </div>
    </div>
</div>

<div class="rack-unit-back u3" data-unit-back="combinator" data-id="${id}" style="
    background:repeating-linear-gradient(45deg, rgba(255,255,255,0.003) 0px, transparent 1px, transparent 3px),
        linear-gradient(160deg, #1d1c1a, #201f1d 40%, #1e1d1b);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 48px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <span style="font:900 11px/1 'Impact',sans-serif;color:rgba(255,255,255,0.1);letter-spacing:0.1em;text-transform:uppercase;">Crate</span>
        <span style="font:400 11px/1 'Courier New',monospace;color:rgba(255,255,255,0.05);">CM-01</span>
        <span style="font:400 6px/1 'Courier New',monospace;color:rgba(255,255,255,0.04);margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 48px;display:flex;gap:18px;">
        <div class="patch-group"><div class="patch-jack" data-input="signal" data-unit-id="${id}"></div><div class="patch-jack-label">in</div></div>
        <div class="patch-group"><div class="patch-jack" data-output="signal" data-unit-id="${id}"></div><div class="patch-jack-label">out</div></div>
        <div class="patch-group"><div class="patch-jack" data-input="cv1" data-unit-id="${id}"></div><div class="patch-jack-label">cv 1</div></div>
        <div class="patch-group"><div class="patch-jack" data-input="cv2" data-unit-id="${id}"></div><div class="patch-jack-label">cv 2</div></div>
        <div class="patch-group"><div class="patch-jack" data-input="cv3" data-unit-id="${id}"></div><div class="patch-jack-label">cv 3</div></div>
        <div class="patch-group"><div class="patch-jack" data-input="cv4" data-unit-id="${id}"></div><div class="patch-jack-label">cv 4</div></div>
    </div>
    <div style="padding:6px 48px;margin-top:auto;border-top:1px solid rgba(74,222,128,0.02);">
        <div style="font:400 7px/1 'Courier New',monospace;color:rgba(74,222,128,0.04);letter-spacing:0.04em;line-height:1.8;">
            FORGERACK CRATE &#x2022; CM-01 REV.A &#x2022; 4-MACRO CONTAINER<br>
            MAX DEPTH: 8U &#x2022; SVEND MFG
        </div>
    </div>
</div>
