<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  COMPARATOR CMP-01 — Dual-Input Comparison Meter             ║
 ║  Manufacturer: FLUKE                                         ║
 ║  Identity: Yellow rubber armor, twin LCD readouts, rotary    ║
 ║  selector. Is batch A different from batch B? Clip both      ║
 ║  leads on, read the answer.                                  ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<!-- ════════ FRONT PANEL ════════ -->
<div class="rack-unit-front u4 mfr-fluke" data-unit="comparator" data-id="${id}" style="
    --device-accent:#f59e0b;
    background: linear-gradient(160deg, #1a1a1a 0%, #222 30%, #1e1e1e 50%, #181818 80%);
    overflow:hidden;
">
    <!-- Nameplate -->
    <div style="
        display:flex;align-items:center;gap:8px;
        padding:3px 48px;
        border-bottom:1px solid rgba(0,0,0,0.4);
        background: linear-gradient(180deg, rgba(245,158,11,0.005), rgba(0,0,0,0.1));
    ">
        <div class="led-housing"><span class="led" id="${id}-led" style="width:6px;height:6px;"></span></div>
        <span style="font:900 13px/1 'Arial',sans-serif;color:rgba(245,158,11,0.25);letter-spacing:0.15em;text-transform:uppercase;">Comparator</span>
        <span style="font:300 9px/1 'Arial',sans-serif;color:rgba(245,158,11,0.1);font-style:italic;">Dual Input</span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
            <!-- Input status LEDs -->
            <div style="display:flex;align-items:center;gap:3px;">
                <span class="led" id="${id}-led-a" style="width:5px;height:5px;"></span>
                <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(239,68,68,0.2);">A</span>
            </div>
            <div style="display:flex;align-items:center;gap:3px;">
                <span class="led" id="${id}-led-b" style="width:5px;height:5px;"></span>
                <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(96,165,250,0.2);">B</span>
            </div>
            <span style="font:500 9px/1 'Courier New',monospace;color:rgba(245,158,11,0.1);">CMP-01</span>
        </div>
    </div>

    <div style="padding:6px 48px;display:flex;gap:10px;height:calc(100% - 30px);">

        <!-- Yellow armor housing -->
        <div class="fluke-armor" style="flex:1;padding:8px 12px;display:flex;gap:10px;overflow:hidden;">

            <!-- Left: column selectors + mean LCDs only -->
            <div style="display:flex;flex-direction:column;gap:6px;justify-content:center;width:110px;">
                <!-- A row -->
                <div style="display:flex;flex-direction:column;gap:2px;">
                    <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(180,40,40,0.6);text-transform:uppercase;letter-spacing:0.08em;">Input A</span>
                    <div style="display:flex;gap:4px;align-items:center;">
                        <select id="${id}-col-a" style="
                            flex:1;background:#1a0800;border:1px solid rgba(239,68,68,0.25);
                            color:#ef4444;padding:3px 5px;border-radius:1px;
                            font:10px/1 'JetBrains Mono',monospace;
                        "><option value="">column</option></select>
                        <div class="fluke-lcd" style="padding:2px 4px;min-width:48px;">
                            <div class="fluke-lcd-ghost" style="font-size:10px;">888.8</div>
                            <div class="fluke-lcd-value" id="${id}-mean-a" style="font-size:10px;color:#8b2020;">—</div>
                        </div>
                    </div>
                </div>
                <!-- B row -->
                <div style="display:flex;flex-direction:column;gap:2px;">
                    <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(40,80,180,0.6);text-transform:uppercase;letter-spacing:0.08em;">Input B</span>
                    <div style="display:flex;gap:4px;align-items:center;">
                        <select id="${id}-col-b" style="
                            flex:1;background:#000814;border:1px solid rgba(96,165,250,0.25);
                            color:#60a5fa;padding:3px 5px;border-radius:1px;
                            font:10px/1 'JetBrains Mono',monospace;
                        "><option value="">column</option></select>
                        <div class="fluke-lcd" style="padding:2px 4px;min-width:48px;">
                            <div class="fluke-lcd-ghost" style="font-size:10px;">888.8</div>
                            <div class="fluke-lcd-value" id="${id}-mean-b" style="font-size:10px;color:#1e40af;">—</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: main LCD + mode + n counts below -->
            <div style="flex:1;display:flex;flex-direction:column;gap:4px;justify-content:center;">
                <div class="fluke-lcd" style="padding:10px 12px;">
                    <div class="fluke-lcd-ghost" style="font-size:32px;">88.8888</div>
                    <div class="fluke-lcd-value" id="${id}-main-value" style="font-size:32px;">—</div>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span id="${id}-mode-label" style="font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.55);text-transform:uppercase;letter-spacing:0.1em;">DIFFERENCE</span>
                    <span class="led lg" id="${id}-led-sig" style="margin-left:auto;"></span>
                </div>
                <!-- Mode + n counts — horizontal row -->
                <div style="display:flex;gap:6px;align-items:center;">
                    <div class="segment" id="${id}-mode-seg" style="border-color:rgba(100,70,0,0.3);">
                        <button class="segment-btn active" data-mode="diff" style="font-size:9px;padding:4px 8px;color:rgba(80,50,0,0.6);background:rgba(80,50,0,0.08);border-color:rgba(100,70,0,0.15);">&#x0394;</button>
                        <button class="segment-btn" data-mode="ratio" style="font-size:9px;padding:4px 8px;color:rgba(80,50,0,0.6);background:rgba(80,50,0,0.08);border-color:rgba(100,70,0,0.15);">A/B</button>
                        <button class="segment-btn" data-mode="tstat" style="font-size:9px;padding:4px 8px;color:rgba(80,50,0,0.6);background:rgba(80,50,0,0.08);border-color:rgba(100,70,0,0.15);">t</button>
                        <button class="segment-btn" data-mode="pval" style="font-size:9px;padding:4px 8px;color:rgba(80,50,0,0.6);background:rgba(80,50,0,0.08);border-color:rgba(100,70,0,0.15);">p</button>
                    </div>
                    <div style="margin-left:auto;display:flex;gap:3px;">
                        <div class="fluke-lcd" style="padding:2px 4px;">
                            <div class="fluke-lcd-ghost" style="font-size:9px;">888</div>
                            <div class="fluke-lcd-value" id="${id}-n-a" style="font-size:9px;color:#8b2020;">—</div>
                        </div>
                        <div class="fluke-lcd" style="padding:2px 4px;">
                            <div class="fluke-lcd-ghost" style="font-size:9px;">888</div>
                            <div class="fluke-lcd-value" id="${id}-n-b" style="font-size:9px;color:#1e40af;">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ════════ BACK PANEL ════════ -->
<div class="rack-unit-back u4" data-unit-back="comparator" data-id="${id}" style="
    background: linear-gradient(180deg, #1c1c1c, #181818);overflow:hidden;
">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 48px;border-bottom:1px solid rgba(255,255,255,0.05);">
        <span style="font:700 10px/1 'Arial',sans-serif;color:rgba(245,158,11,0.12);letter-spacing:0.12em;text-transform:uppercase;">Comparator</span>
        <span style="font:400 10px/1 'Courier New',monospace;color:rgba(255,255,255,0.06);">CMP-01</span>
        <span class="serial-tag" style="margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 48px;display:flex;gap:24px;">
        <div>
            <div style="font:700 9px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px;">Input</div>
            <div style="display:flex;gap:12px;">
                <div class="patch-group"><div class="patch-jack" data-input="data" data-unit-id="${id}"></div><div class="patch-jack-label">Data</div></div>
                <div class="patch-group"><div class="patch-jack" data-output="result" data-unit-id="${id}"></div><div class="patch-jack-label">Result</div></div>
                <div class="patch-group"><div class="patch-jack" data-output="thru" data-unit-id="${id}"></div><div class="patch-jack-label">Thru</div></div>
            </div>
        </div>
    </div>
    <div style="padding:6px 48px;margin-top:auto;border-top:1px solid rgba(245,158,11,0.02);">
        <div style="font:300 7px/1.6 'Courier New',monospace;color:rgba(245,158,11,0.05);letter-spacing:0.04em;">
            FORGERACK COMPARATOR &#x2022; CMP-01 REV.A &#x2022; DUAL INPUT METER<br>
            WELCH T-TEST &#x2022; TWO-SAMPLE &#x2022; FLUKE MFG
        </div>
    </div>
</div>
