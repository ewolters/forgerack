<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  COMPARATOR CMP-01 — Dual-Input Comparison Meter             ║
 ║  Manufacturer: FLUKE                                         ║
 ║  Identity: Yellow rubber armor, twin LCD readouts, rotary    ║
 ║  selector. Is batch A different from batch B? Clip both      ║
 ║  leads on, read the answer.                                  ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<!-- ════════ FRONT PANEL ════════ -->
<div class="rack-unit-front u4 mfr-fluke" data-unit="comparator" data-id="${id}" style="
    --device-accent:#f59e0b;
    background: linear-gradient(160deg, #1a1a1a 0%, #222 30%, #1e1e1e 50%, #181818 80%);
    overflow:hidden;
">
    <!-- Nameplate -->
    <div style="
        display:flex;align-items:center;gap:8px;
        padding:3px 48px;
        border-bottom:1px solid rgba(0,0,0,0.4);
        background: linear-gradient(180deg, rgba(245,158,11,0.005), rgba(0,0,0,0.1));
    ">
        <div class="led-housing"><span class="led" id="${id}-led" style="width:6px;height:6px;"></span></div>
        <span style="font:900 13px/1 'Arial',sans-serif;color:rgba(245,158,11,0.25);letter-spacing:0.15em;text-transform:uppercase;">Comparator</span>
        <span style="font:300 9px/1 'Arial',sans-serif;color:rgba(245,158,11,0.1);font-style:italic;">Dual Input</span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
            <!-- Input status LEDs -->
            <div style="display:flex;align-items:center;gap:3px;">
                <span class="led" id="${id}-led-a" style="width:5px;height:5px;"></span>
                <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(239,68,68,0.2);">A</span>
            </div>
            <div style="display:flex;align-items:center;gap:3px;">
                <span class="led" id="${id}-led-b" style="width:5px;height:5px;"></span>
                <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(96,165,250,0.2);">B</span>
            </div>
            <span style="font:500 9px/1 'Courier New',monospace;color:rgba(245,158,11,0.1);">CMP-01</span>
        </div>
    </div>

    <div style="padding:6px 48px;display:flex;gap:10px;height:calc(100% - 30px);">

        <!-- Yellow armor housing -->
        <div class="fluke-armor" style="flex:1;padding:8px 12px;display:flex;gap:10px;">

            <!-- Left: column selectors + mode -->
            <div style="display:flex;flex-direction:column;gap:6px;justify-content:center;width:90px;">
                <!-- Column A -->
                <div style="display:flex;flex-direction:column;gap:2px;">
                    <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(180,40,40,0.6);text-transform:uppercase;letter-spacing:0.08em;">Input A</span>
                    <select id="${id}-col-a" style="
                        background:#1a0800;border:1px solid rgba(239,68,68,0.25);
                        color:#ef4444;padding:3px 5px;border-radius:1px;
                        font:10px/1 'JetBrains Mono',monospace;
                    "><option value="">column</option></select>
                </div>
                <!-- Column B -->
                <div style="display:flex;flex-direction:column;gap:2px;">
                    <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(40,80,180,0.6);text-transform:uppercase;letter-spacing:0.08em;">Input B</span>
                    <select id="${id}-col-b" style="
                        background:#000814;border:1px solid rgba(96,165,250,0.25);
                        color:#60a5fa;padding:3px 5px;border-radius:1px;
                        font:10px/1 'JetBrains Mono',monospace;
                    "><option value="">column</option></select>
                </div>
                <!-- Mode selector -->
                <div class="segment" id="${id}-mode-seg" style="margin-top:auto;">
                    <button class="segment-btn active" data-mode="diff" style="font-size:8px;padding:3px 5px;">&#x0394;</button>
                    <button class="segment-btn" data-mode="ratio" style="font-size:8px;padding:3px 5px;">A/B</button>
                    <button class="segment-btn" data-mode="tstat" style="font-size:8px;padding:3px 5px;">t</button>
                    <button class="segment-btn" data-mode="pval" style="font-size:8px;padding:3px 5px;">p</button>
                </div>
            </div>

            <!-- Center: main LCD — the big reading -->
            <div style="flex:1;display:flex;flex-direction:column;gap:4px;justify-content:center;">
                <div class="fluke-lcd" style="padding:10px 12px;">
                    <div class="fluke-lcd-ghost" style="font-size:32px;">88.8888</div>
                    <div class="fluke-lcd-value" id="${id}-main-value" style="font-size:32px;">—</div>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span id="${id}-mode-label" style="font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.55);text-transform:uppercase;letter-spacing:0.1em;">DIFFERENCE</span>
                    <span id="${id}-verdict" style="font:700 9px/1 'Arial',sans-serif;color:rgba(20,10,0,0.35);text-transform:uppercase;"></span>
                </div>
            </div>

            <!-- Right: secondary readouts -->
            <div style="width:72px;display:flex;flex-direction:column;gap:4px;justify-content:center;">
                <!-- Mean A -->
                <div style="text-align:center;">
                    <div class="fluke-lcd" style="padding:3px 6px;">
                        <div class="fluke-lcd-ghost" style="font-size:13px;">888.88</div>
                        <div class="fluke-lcd-value" id="${id}-mean-a" style="font-size:13px;color:#8b2020;">—</div>
                    </div>
                    <span style="font:700 7px/1 'Arial',sans-serif;color:rgba(180,40,40,0.5);letter-spacing:0.08em;">x&#x0304; A</span>
                </div>
                <!-- Mean B -->
                <div style="text-align:center;">
                    <div class="fluke-lcd" style="padding:3px 6px;">
                        <div class="fluke-lcd-ghost" style="font-size:13px;">888.88</div>
                        <div class="fluke-lcd-value" id="${id}-mean-b" style="font-size:13px;color:#1e40af;">—</div>
                    </div>
                    <span style="font:700 7px/1 'Arial',sans-serif;color:rgba(40,80,180,0.5);letter-spacing:0.08em;">x&#x0304; B</span>
                </div>
                <!-- N counts -->
                <div style="display:flex;gap:4px;justify-content:center;">
                    <div style="text-align:center;">
                        <span id="${id}-n-a" style="font:700 11px/1 'JetBrains Mono',monospace;color:rgba(180,40,40,0.4);">—</span>
                        <div style="font:600 6px/1 'Arial',sans-serif;color:rgba(20,10,0,0.3);">nA</div>
                    </div>
                    <div style="text-align:center;">
                        <span id="${id}-n-b" style="font:700 11px/1 'JetBrains Mono',monospace;color:rgba(40,80,180,0.4);">—</span>
                        <div style="font:600 6px/1 'Arial',sans-serif;color:rgba(20,10,0,0.3);">nB</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right panel — banana jacks -->
        <div style="width:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                <div class="banana-post red"><div class="banana-post-ring"></div><div class="banana-post-hole"></div></div>
                <span style="font:700 7px/1 'Arial',sans-serif;color:rgba(239,68,68,0.2);">A</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                <div class="banana-post black"><div class="banana-post-ring"></div><div class="banana-post-hole"></div></div>
                <span style="font:700 7px/1 'Arial',sans-serif;color:rgba(96,165,250,0.2);">B</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                <div class="banana-post green"><div class="banana-post-ring"></div><div class="banana-post-hole"></div></div>
                <span style="font:700 7px/1 'Arial',sans-serif;color:rgba(34,197,94,0.2);">GND</span>
            </div>
        </div>
    </div>
</div>

<!-- ════════ BACK PANEL ════════ -->
<div class="rack-unit-back u4" data-unit-back="comparator" data-id="${id}" style="
    background: linear-gradient(180deg, #1c1c1c, #181818);overflow:hidden;
">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 48px;border-bottom:1px solid rgba(255,255,255,0.05);">
        <span style="font:700 10px/1 'Arial',sans-serif;color:rgba(245,158,11,0.12);letter-spacing:0.12em;text-transform:uppercase;">Comparator</span>
        <span style="font:400 10px/1 'Courier New',monospace;color:rgba(255,255,255,0.06);">CMP-01</span>
        <span class="serial-tag" style="margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 48px;display:flex;gap:24px;">
        <div>
            <div style="font:700 9px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px;">Input</div>
            <div style="display:flex;gap:12px;">
                <div class="patch-group"><div class="patch-jack" data-input="a" data-unit-id="${id}"></div><div class="patch-jack-label">A</div></div>
                <div class="patch-group"><div class="patch-jack" data-input="b" data-unit-id="${id}"></div><div class="patch-jack-label">B</div></div>
            </div>
        </div>
        <div>
            <div style="font:700 9px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px;">Output</div>
            <div style="display:flex;gap:12px;">
                <div class="patch-group"><div class="patch-jack" data-output="result" data-unit-id="${id}"></div><div class="patch-jack-label">Result</div></div>
            </div>
        </div>
    </div>
    <div style="padding:6px 48px;margin-top:auto;border-top:1px solid rgba(245,158,11,0.02);">
        <div style="font:300 7px/1.6 'Courier New',monospace;color:rgba(245,158,11,0.05);letter-spacing:0.04em;">
            FORGERACK COMPARATOR &#x2022; CMP-01 REV.A &#x2022; DUAL INPUT METER<br>
            WELCH T-TEST &#x2022; TWO-SAMPLE &#x2022; FLUKE MFG
        </div>
    </div>
</div>
