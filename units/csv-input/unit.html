<!--
  CSV INPUT — Data Terminal
  FRONT: Tape reader, parse controls, row counter
  BACK: Output jacks (one per parsed column), model plate
-->

<!-- ═══ FRONT PANEL ═══ -->
<div class="rack-unit-front" data-unit="csv-input" data-id="${id}" data-u="3" style="
    --device-accent:#9ca3af;
    min-height:140px;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.003) 0px, transparent 1px, transparent 3px),
        linear-gradient(135deg, #131613 0%, #101310 40%, #121512 60%, #0e110e 100%);
    border:1px solid rgba(156,163,175,0.06);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.015), 0 2px 8px rgba(0,0,0,0.5);
    position:relative;
">
    <!-- Rack ears — bolt holes for rail mounting -->

    <!-- Nameplate — engraved into metal -->
    <div style="
        display:flex;align-items:center;gap:8px;padding:4px 22px;
        border-bottom:2px solid rgba(0,0,0,0.3);
        background: linear-gradient(180deg, rgba(255,255,255,0.008), rgba(0,0,0,0.1));
    ">
        <span class="led" id="${id}-led"></span>
        <span style="
            font:800 10px/1 'Arial Narrow',Impact,'Inter',sans-serif;
            color:transparent;
            text-shadow: 0 1px 0 rgba(156,163,175,0.25), 0 -1px 0 rgba(0,0,0,0.6);
            -webkit-text-stroke: 0.3px rgba(156,163,175,0.15);
            letter-spacing:0.2em;text-transform:uppercase;
        ">CSV Input</span>
        <span style="
            font:400 7px/1 'Courier New',monospace;
            color:rgba(200,180,140,0.18);letter-spacing:0.06em;margin-left:auto;
            text-shadow: 0 0 2px rgba(200,180,140,0.05);
        ">MOD-DT01</span>
    </div>

    <div style="padding:6px 14px;display:flex;gap:10px;">
        <!-- Tape reader — recessed cutout -->
        <div style="
            flex:1;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(0,0,0,0.5);
            border-radius:2px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.01);
            padding:1px;
        ">
            <textarea id="${id}-data" rows="3" placeholder="paste data — csv, tsv, or one value per line"
                style="width:100%;height:100%;background:transparent;border:none;color:#6a7a6a;
                font:10px/1.3 'JetBrains Mono',monospace;padding:4px 6px;resize:none;outline:none;"></textarea>
        </div>

        <!-- Control panel — recessed -->
        <div style="
            width:90px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.3);
            border-radius:2px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.01);
            padding:6px;
            display:flex;flex-direction:column;gap:4px;align-items:center;
        ">
            <!-- Row counter — recessed 7-segment window -->
            <div style="
                background:#050705;border:1px solid rgba(0,0,0,0.6);border-radius:1px;
                padding:2px 6px;box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
                text-align:center;width:100%;
            ">
                <div id="${id}-n" style="font:700 16px/1 'JetBrains Mono',monospace;color:#9ca3af;
                    text-shadow:0 0 6px rgba(156,163,175,0.12);">&#x2014;</div>
                <div style="font:700 5px/1 'Arial',sans-serif;color:rgba(156,163,175,0.2);
                    text-transform:uppercase;letter-spacing:0.2em;margin-top:2px;">ROWS</div>
            </div>
            <button onclick="ForgeRack.units['${id}'].parse()" style="
                width:100%;padding:4px 0;font:700 7px/1 'Arial',sans-serif;text-transform:uppercase;
                letter-spacing:0.12em;background:linear-gradient(180deg, rgba(156,163,175,0.1), rgba(156,163,175,0.04));
                border:1px solid rgba(156,163,175,0.12);color:#9ca3af;border-radius:1px;cursor:pointer;
                box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            ">&#x25B6; Parse</button>
            <button onclick="ForgeRack.units['${id}'].demo()" style="
                width:100%;padding:3px 0;font:600 6px/1 'Arial',sans-serif;text-transform:uppercase;
                letter-spacing:0.1em;background:transparent;border:1px solid rgba(156,163,175,0.06);
                color:rgba(156,163,175,0.3);border-radius:1px;cursor:pointer;
            ">Load Demo</button>
        </div>
    </div>

    <!-- Column chips -->
    <div id="${id}-cols" style="display:none;padding:0 14px 4px;"></div>
</div>

<!-- ═══ BACK PANEL ═══ -->
<div class="rack-unit-back" data-unit-back="csv-input" data-id="${id}" style="
    min-height:140px;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.005) 0px, transparent 1px, transparent 2px),
        linear-gradient(135deg, #1a1a1a, #1e1e1e 40%, #1c1c1c 60%, #191919);
    border:1px solid rgba(255,255,255,0.04);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02), 0 2px 6px rgba(0,0,0,0.4);
    position:relative;
">
    <!-- Rack ears -->

    <!-- Back nameplate — simpler, stamped into steel -->
    <div style="display:flex;align-items:center;gap:8px;padding:4px 22px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(255,255,255,0.12);letter-spacing:0.15em;text-transform:uppercase;">CSV Input</span>
        <span style="font:400 7px/1 'Courier New',monospace;color:rgba(255,255,255,0.06);margin-left:auto;">S/N ${id}</span>
    </div>

    <!-- Output jacks cluster -->
    <div style="padding:10px 22px;">
        <div style="font:700 6px/1 'Arial',sans-serif;color:rgba(255,255,255,0.08);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px;">Output Channels</div>
        <div id="${id}-back-jacks" style="display:flex;gap:12px;flex-wrap:wrap;">
            <!-- Jacks generated per parsed column -->
            <div style="font:300 9px/1 'Inter',sans-serif;color:rgba(255,255,255,0.06);">Parse data to populate jacks</div>
        </div>
    </div>

    <!-- PCB trace decoration -->
    <div style="margin:8px 22px;border-top:1px solid rgba(74,222,128,0.03);padding-top:6px;">
        <div style="font:400 6px/1 'Courier New',monospace;color:rgba(74,222,128,0.06);letter-spacing:0.04em;">
            FORGERACK DATA TERMINAL &#x2022; MOD-DT01 REV.A &#x2022; SVEND MFG
        </div>
    </div>
</div>
