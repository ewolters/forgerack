<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  DESIGNER DX-01 — Experiment Design Generator                ║
 ║  Manufacturer: TOKAMAK                                       ║
 ║  Identity: Charcoal-black, plasma rose, chrome bezels.       ║
 ║  The front half of DOE. Define factors, pick design type,    ║
 ║  generate randomized run sheet. Output wires to RESOLVER.    ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<!-- ════════ FRONT PANEL ════════ -->
<div class="rack-unit-front u8 mfr-tokamak chamfer-heavy" data-unit="designer" data-id="${id}" style="
    --device-accent:#f43f5e;
    background:
        radial-gradient(ellipse at 50% 60%, rgba(244,63,94,0.006), transparent 60%),
        linear-gradient(160deg, #141416 0%, #111113 30%, #131315 50%, #0e0e10 80%);
    overflow:hidden;
">
    <!-- Nameplate -->
    <div style="
        display:flex;align-items:center;gap:8px;
        padding:4px 48px;
        border-bottom:2px solid rgba(0,0,0,0.4);
        background: linear-gradient(180deg, rgba(244,63,94,0.01), rgba(0,0,0,0.15));
    ">
        <div class="led-housing"><span class="led lg" id="${id}-led" style=""></span></div>
        <span style="
            font:800 16px/1 'Arial Narrow','Arial',sans-serif;
            color:transparent;
            text-shadow: 0 1px 0 rgba(244,63,94,0.4), 0 -1px 0 rgba(0,0,0,0.6);
            -webkit-text-stroke: 0.3px rgba(244,63,94,0.2);
            letter-spacing:0.18em;text-transform:uppercase;
        ">Designer</span>
        <span style="font:300 9px/1 'Arial Narrow',sans-serif;color:rgba(244,63,94,0.12);font-style:italic;">Experiment Generator</span>
        <span style="font:600 9px/1 'Courier New',monospace;color:rgba(244,63,94,0.1);margin-left:auto;">DX-01</span>
    </div>

    <div style="padding:5px 48px;display:flex;gap:8px;height:calc(100% - 32px);">

        <!-- Left: Factor entry + design selector -->
        <div style="width:180px;display:flex;flex-direction:column;gap:4px;">
            <!-- Factor list -->
            <div style="font:700 8px/1 'Arial Narrow',sans-serif;color:rgba(244,63,94,0.3);text-transform:uppercase;letter-spacing:0.12em;">Factors</div>
            <div id="${id}-factors" style="
                flex:1;overflow-y:auto;
                background:rgba(0,0,0,0.2);border:1px solid rgba(244,63,94,0.06);border-radius:2px;
                padding:4px;display:flex;flex-direction:column;gap:3px;
                box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);
            ">
                <!-- Factor rows get added here -->
            </div>

            <!-- Add factor row -->
            <div style="display:flex;gap:2px;">
                <input type="text" id="${id}-f-name" placeholder="name" style="
                    flex:1;background:rgba(0,0,0,0.4);border:1px solid rgba(244,63,94,0.12);
                    color:#e8a0b0;padding:3px 4px;border-radius:1px;
                    font:9px/1 'JetBrains Mono',monospace;
                ">
                <input type="number" id="${id}-f-low" placeholder="low" style="
                    width:40px;background:rgba(0,0,0,0.4);border:1px solid rgba(244,63,94,0.12);
                    color:#f43f5e;padding:3px 3px;border-radius:1px;text-align:center;
                    font:9px/1 'JetBrains Mono',monospace;
                ">
                <input type="number" id="${id}-f-high" placeholder="high" style="
                    width:40px;background:rgba(0,0,0,0.4);border:1px solid rgba(244,63,94,0.12);
                    color:#f43f5e;padding:3px 3px;border-radius:1px;text-align:center;
                    font:9px/1 'JetBrains Mono',monospace;
                ">
                <button class="btn-chrome" id="${id}-btn-add" style="padding:3px 6px;font-size:8px;">+</button>
            </div>

            <!-- Design type -->
            <div style="display:flex;flex-direction:column;gap:2px;">
                <div style="font:700 8px/1 'Arial Narrow',sans-serif;color:rgba(244,63,94,0.3);text-transform:uppercase;letter-spacing:0.12em;">Design</div>
                <select id="${id}-design" style="
                    background:#0a0a0c;border:1px solid rgba(244,63,94,0.15);
                    color:#e8a0b0;padding:3px 5px;border-radius:1px;
                    font:10px/1 'JetBrains Mono',monospace;
                ">
                    <option value="full">Full Factorial</option>
                    <option value="fractional">Fractional Factorial</option>
                    <option value="ccd">CCD (Response Surface)</option>
                    <option value="bbd">Box-Behnken</option>
                    <option value="dsd">Definitive Screening</option>
                </select>
            </div>

            <!-- Generate button -->
            <button id="${id}-btn-gen" class="btn-run" style="color:#f43f5e;border-color:rgba(244,63,94,0.3);
                background:linear-gradient(180deg,rgba(244,63,94,0.2),rgba(244,63,94,0.08));
                width:100%;">&#x25B6; Generate</button>
        </div>

        <!-- Right: Run sheet CRT -->
        <div style="flex:1;display:flex;flex-direction:column;gap:3px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div style="font:700 8px/1 'Arial Narrow',sans-serif;color:rgba(244,63,94,0.3);text-transform:uppercase;letter-spacing:0.12em;">Run Sheet</div>
                <div style="display:flex;gap:6px;align-items:center;">
                    <div style="font:700 10px/1 'JetBrains Mono',monospace;color:rgba(244,63,94,0.2);">
                        <span id="${id}-n-runs">—</span> runs
                    </div>
                    <span class="badge badge-accent" id="${id}-design-badge" style="display:none;font-size:7px;"></span>
                </div>
            </div>
            <div class="reactor-pulse" style="flex:1;
                background:rgba(0,0,0,0.4);border:2px solid rgba(30,30,34,0.8);border-radius:2px;
                box-shadow:inset 0 2px 8px rgba(0,0,0,0.5);
                position:relative;overflow:hidden;
            ">
                <!-- Rose scanlines -->
                <div style="position:absolute;inset:0;
                    background:repeating-linear-gradient(180deg, transparent, transparent 2px, rgba(244,63,94,0.005) 2px, rgba(244,63,94,0.005) 4px);
                    pointer-events:none;z-index:2;"></div>
                <div style="position:absolute;inset:0;box-shadow:inset 0 0 20px rgba(0,0,0,0.4);pointer-events:none;z-index:3;"></div>

                <div id="${id}-runsheet" style="
                    height:100%;overflow-y:auto;padding:6px 8px;
                    font:10px/1.5 'JetBrains Mono',monospace;
                    color:rgba(244,63,94,0.25);
                    text-shadow: 0 0 4px currentColor, 1.5px 0 0 rgba(255,0,255,0.08), -1.5px 0 0 rgba(0,255,255,0.08);
                    position:relative;z-index:1;
                "><span style="color:rgba(244,63,94,0.08);">Add factors and generate design_</span></div>
            </div>
        </div>
    </div>
</div>

<!-- ════════ BACK PANEL ════════ -->
<div class="rack-unit-back u8" data-unit-back="designer" data-id="${id}" style="
    background: linear-gradient(160deg, #1c1c1c, #1f1f1f 40%, #1d1d1d);overflow:hidden;
">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 48px;border-bottom:1px solid rgba(255,255,255,0.05);">
        <span style="font:800 11px/1 'Arial Narrow',sans-serif;color:rgba(255,255,255,0.1);letter-spacing:0.15em;text-transform:uppercase;">Designer</span>
        <span style="font:400 11px/1 'Courier New',monospace;color:rgba(255,255,255,0.06);">DX-01</span>
        <span class="serial-tag" style="margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 48px;">
        <div style="font:700 9px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:10px;">Signal</div>
        <div style="display:flex;gap:18px;">
            <div class="patch-group"><div class="patch-jack" data-output="design" data-unit-id="${id}"></div><div class="patch-jack-label">design</div></div>
            <div class="patch-group"><div class="patch-jack" data-output="runsheet" data-unit-id="${id}"></div><div class="patch-jack-label">run sheet</div></div>
        </div>
    </div>
    <div style="padding:6px 48px;margin-top:auto;border-top:1px solid rgba(244,63,94,0.02);">
        <div style="font:300 7px/1.6 'Courier New',monospace;color:rgba(244,63,94,0.04);letter-spacing:0.04em;">
            FORGERACK DESIGNER &#x2022; DX-01 REV.A &#x2022; FORGEDOE ENGINE<br>
            FACTORIAL &#x2022; CCD &#x2022; BOX-BEHNKEN &#x2022; DSD &#x2022; TOKAMAK MFG
        </div>
    </div>
</div>
