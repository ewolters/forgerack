<!--
  FILTER — Conditional Gate
  Identity: Precision lab instrument. Cyan accents. Anodized aluminum.
  Think: signal conditioner from a test bench.
  FRONT: Mode selector, threshold dial, pass/reject counters
  BACK: In/pass/reject jacks, calibration info
-->
<div class="rack-unit-front u3" data-unit="filter" data-id="${id}" data-u="2" style="
    --device-accent:#22d3ee;
    ;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.003) 0px, transparent 1px, transparent 3px),
        linear-gradient(135deg, #0c1213 0%, #0a0f10 40%, #0b1011 60%, #090d0e 100%);
    
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.01), 0 2px 8px rgba(0,0,0,0.5);
">
    <!-- Nameplate -->
    <div style="
        display:flex;align-items:center;gap:8px;padding:4px 22px;
        border-bottom:2px solid rgba(0,0,0,0.3);
        background: linear-gradient(180deg, rgba(34,211,238,0.01), rgba(0,0,0,0.1));
    ">
        <span class="led" id="${id}-led"></span>
        <span style="
            font:800 10px/1 'Helvetica Neue','Arial',sans-serif;
            color:transparent;
            text-shadow: 0 1px 0 rgba(34,211,238,0.3), 0 -1px 0 rgba(0,0,0,0.6);
            -webkit-text-stroke: 0.3px rgba(34,211,238,0.18);
            letter-spacing:0.18em;text-transform:uppercase;
        ">Filter</span>
        <span style="font:300 7px/1 'Helvetica Neue',sans-serif;color:rgba(34,211,238,0.15);margin-left:2px;">Conditional Gate</span>
        <span style="font:400 7px/1 'Courier New',monospace;color:rgba(200,180,140,0.15);margin-left:auto;">FLT-01</span>
    </div>

    <div style="padding:8px 14px;display:flex;gap:14px;align-items:flex-start;">
        <!-- Mode panel — recessed cutout -->
        <div style="
            background:rgba(0,0,0,0.25);border-radius:2px;
            box-shadow:inset 0 1px 4px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.008);
            padding:6px 8px;
        ">
            <div style="font:700 5px/1 'Arial',sans-serif;color:rgba(34,211,238,0.15);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:4px;text-align:center;">Mode</div>
            <div class="segment" style="border-color:rgba(34,211,238,0.08);">
                <button class="segment-btn active" style="font-size:8px;padding:3px 6px;font-weight:700;">&#x003E;</button>
                <button class="segment-btn" style="font-size:8px;padding:3px 6px;font-weight:700;">&#x003C;</button>
                <button class="segment-btn" style="font-size:8px;padding:3px 6px;font-weight:700;">&#x003D;</button>
                <button class="segment-btn" style="font-size:8px;padding:3px 6px;font-weight:700;">&#x2260;</button>
            </div>
        </div>

        <!-- Threshold dial — recessed cutout -->
        <div style="
            background:rgba(0,0,0,0.25);border-radius:2px;
            box-shadow:inset 0 1px 4px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.008);
            padding:6px 10px;display:flex;flex-direction:column;align-items:center;
        ">
            <div class="dial" data-dial='{"min":-100,"max":100,"value":0,"step":0.1}'>
                <div class="dial-knob" style="width:30px;height:30px;"></div>
                <div class="dial-value" style="color:#22d3ee;font-size:10px;">0.0</div>
                <div class="dial-label" style="color:rgba(34,211,238,0.2);">threshold</div>
            </div>
        </div>

        <!-- Counters — recessed instrument windows -->
        <div style="display:flex;gap:8px;margin-left:auto;">
            <div style="
                background:#040604;border-radius:1px;
                padding:4px 8px;box-shadow:inset 0 1px 3px rgba(0,0,0,0.6);text-align:center;
            ">
                <div id="${id}-pass" style="font:700 16px/1 'JetBrains Mono',monospace;color:#22c55e;
                    text-shadow:0 0 6px rgba(34,197,94,0.15);">&#x2014;</div>
                <div style="font:700 5px/1 'Arial',sans-serif;color:rgba(34,197,94,0.2);
                    text-transform:uppercase;letter-spacing:0.15em;margin-top:2px;">Pass</div>
            </div>
            <div style="
                background:#040604;border-radius:1px;
                padding:4px 8px;box-shadow:inset 0 1px 3px rgba(0,0,0,0.6);text-align:center;
            ">
                <div id="${id}-reject" style="font:700 16px/1 'JetBrains Mono',monospace;color:#ef4444;
                    text-shadow:0 0 6px rgba(239,68,68,0.15);">&#x2014;</div>
                <div style="font:700 5px/1 'Arial',sans-serif;color:rgba(239,68,68,0.2);
                    text-transform:uppercase;letter-spacing:0.15em;margin-top:2px;">Reject</div>
            </div>
        </div>
    </div>
</div>

<!-- BACK -->
<div class="rack-unit-back u3" data-unit-back="filter" data-id="${id}" data-u="2" style="
    ;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,0.004) 0px, transparent 1px, transparent 2px),
        linear-gradient(135deg, #1c1c1c, #1e1e1e 40%, #1b1b1b);
    
">
    <div style="display:flex;align-items:center;gap:8px;padding:4px 22px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <span style="font:700 8px/1 'Arial',sans-serif;color:rgba(255,255,255,0.1);letter-spacing:0.15em;text-transform:uppercase;">FLT-01 Filter</span>
        <span style="font:400 6px/1 'Courier New',monospace;color:rgba(255,255,255,0.05);margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 22px;display:flex;gap:16px;">
        <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">in</div></div>
        <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">pass</div></div>
        <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">reject</div></div>
    </div>
    <div style="padding:4px 22px;font:400 6px/1 'Courier New',monospace;color:rgba(74,222,128,0.05);">
        FORGERACK CONDITIONAL GATE &#x2022; FLT-01 REV.A &#x2022; SVEND MFG
    </div>
</div>
