<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  HERALD TT-01 — Teletype Interpreter                        ║
 ║  Identity: 1970s line printer. Courier. Green phosphor CRT.  ║
 ║  Paper-roll texture. Mechanical. The interpretation machine. ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<div class="rack-unit-front u4" data-unit="narrative" data-id="${id}" style="
    --device-accent:#22c55e;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.002) 0px, transparent 1px, transparent 4px),
        linear-gradient(160deg, #090b09 0%, #070907 30%, #080a08 50%, #060806 80%);
    overflow:hidden;
">
    <!-- Nameplate — typewriter branding -->
    <div style="
        display:flex;align-items:center;gap:8px;
        padding:4px 48px;
        border-bottom:1px solid rgba(34,197,94,0.03);
        background: rgba(0,0,0,0.12);
    ">
        <div style="width:12px;height:12px;border-radius:50%;background:rgba(0,0,0,0.3);
            box-shadow:inset 0 1px 2px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;">
            <span class="led" id="${id}-led" style="width:6px;height:6px;"></span>
        </div>
        <span style="
            font:700 24px/1 'Courier New','Courier',monospace;
            color:rgba(34,197,94,0.3);
            letter-spacing:0.06em;
            text-transform:uppercase;
        ">Herald</span>
        <span style="font:400 12px/1 'Courier New',monospace;color:rgba(34,197,94,0.1);">teletype interpreter</span>
        <span style="font:400 12px/1 'Courier New',monospace;color:rgba(200,180,140,0.12);margin-left:auto;">TT-01</span>
    </div>

    <!-- Terminal screen — deep CRT recess -->
    <div style="
        margin:6px 48px;padding:3px;
        background:linear-gradient(145deg, rgba(255,255,255,0.015), rgba(0,0,0,0.12));
        border-radius:2px;
        box-shadow:inset 0 1px 0 rgba(0,0,0,0.2), 0 1px 0 rgba(255,255,255,0.006);
    ">
        <div style="
            background:#020402;border:1px solid rgba(0,0,0,0.8);border-radius:1px;
            box-shadow:inset 0 2px 6px rgba(0,0,0,0.6);
            padding:8px 10px;height:110px;overflow-y:auto;position:relative;
        ">
            <div style="position:absolute;inset:0;
                background:repeating-linear-gradient(0deg, transparent 0px, rgba(0,0,0,0.05) 1px, transparent 2px);
                pointer-events:none;"></div>
            <div style="position:absolute;inset:0;
                background:radial-gradient(ellipse at center, rgba(34,197,94,0.015), rgba(0,0,0,0.1) 80%);
                pointer-events:none;"></div>
            <div style="position:absolute;inset:0;box-shadow:inset 0 0 20px rgba(0,0,0,0.3);pointer-events:none;"></div>

            <div id="${id}-text" style="
                font:13px/1.6 'JetBrains Mono','Courier New',monospace;
                color:rgba(34,197,94,0.55);
                white-space:pre-wrap;position:relative;
            "><span style="color:rgba(34,197,94,0.15);">&#x25A0; awaiting input_</span></div>
        </div>
    </div>
</div>

<div class="rack-unit-back u4" data-unit-back="narrative" data-id="${id}" style="
    background:repeating-linear-gradient(180deg, rgba(255,255,255,0.004) 0px, transparent 1px, transparent 2px),
        linear-gradient(160deg, #1b1b1b, #1e1e1e 40%, #1c1c1c);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 48px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <span style="font:700 11px/1 'Courier New',monospace;color:rgba(255,255,255,0.1);letter-spacing:0.08em;text-transform:uppercase;">Herald</span>
        <span style="font:400 11px/1 'Courier New',monospace;color:rgba(255,255,255,0.05);">TT-01</span>
        <span style="font:400 6px/1 'Courier New',monospace;color:rgba(255,255,255,0.04);margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:10px 48px;">
        <div style="font:700 10px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:10px;">Text Input</div>
        <div style="display:flex;gap:18px;">
            <div class="patch-group"><div class="patch-jack" data-input="text" data-unit-id="${id}"></div><div class="patch-jack-label">text</div></div>
            <div class="patch-group"><div class="patch-jack" data-input="summary" data-unit-id="${id}"></div><div class="patch-jack-label">summary</div></div>
        </div>
    </div>
    <div style="padding:6px 48px;margin-top:auto;border-top:1px solid rgba(34,197,94,0.02);">
        <div style="font:400 7px/1 'Courier New',monospace;color:rgba(34,197,94,0.04);letter-spacing:0.04em;line-height:1.8;">
            FORGERACK HERALD &#x2022; TT-01 REV.A &#x2022; 132 COL TELETYPE<br>
            TEXT/SUMMARY/NARRATIVE INPUT &#x2022; SVEND MFG
        </div>
    </div>
</div>
