<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  REGISTER RD-04 — Instrument Cluster Readout                ║
 ║  Identity: Aircraft cockpit gauge panel. Chrome bezels       ║
 ║  around each window. Dark slate. Sturdy, compact.            ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<div class="rack-unit-front u2 mfr-steelwerk tex-brushed wear-scratched wear-polished" data-unit="readout" data-id="${id}" style="
    --device-accent:#e2e8f0;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.002) 0px, transparent 1px, transparent 3px),
        linear-gradient(160deg, #0f110f 0%, #0d0f0d 40%, #0e100e 60%, #0c0e0c 100%);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;padding:5px 48px;height:100%;gap:8px;">

        <!-- Vertical brand — etched into side -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            <span style="
                font:900 10px/1 'Arial Black',sans-serif;
                color:transparent;
                text-shadow: 0 1px 0 rgba(226,232,240,0.15), 0 -1px 0 rgba(0,0,0,0.6);
                -webkit-text-stroke: 0.3px rgba(226,232,240,0.08);
                letter-spacing:0.2em;text-transform:uppercase;
                writing-mode:vertical-lr;transform:rotate(180deg);
            ">Register</span>
        </div>

        <!-- Column selector — themed like SIEVE -->
        <div class="panel-recessed" style="padding:4px 5px;display:flex;flex-direction:column;gap:2px;align-items:center;">
            <div style="font:700 7px/1 'Arial',sans-serif;color:rgba(226,232,240,0.25);text-transform:uppercase;letter-spacing:0.12em;">Col</div>
            <select id="${id}-col" style="
                background:#0a0c0e;border:1px solid rgba(226,232,240,0.15);
                color:#b0c0d0;padding:3px 4px;border-radius:1px;
                font:10px/1 'JetBrains Mono',monospace;max-width:70px;
            ">
                <option value="">auto</option>
            </select>
        </div>

        <!-- 4 gauge windows — LCD style -->
        <div style="display:flex;gap:6px;flex:1;justify-content:center;">
            <div style="text-align:center;flex:1;">
                <div style="
                    background:linear-gradient(180deg, #9aaa8a, #8a9a7a);
                    border:2px solid #2a2a2a;border-radius:2px;
                    box-shadow:inset 0 1px 3px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.008);
                    padding:4px 4px 3px;text-align:right;
                    position:relative;overflow:hidden;
                ">
                    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent 40%,rgba(0,0,0,0.04));pointer-events:none;"></div>
                    <div style="position:relative;">
                        <div style="font:700 18px/1 'JetBrains Mono',monospace;color:rgba(40,50,35,0.08);letter-spacing:0.04em;padding-right:2px;">888.88</div>
                        <div id="${id}-v0" style="font:700 18px/1 'JetBrains Mono',monospace;color:#0a1208;letter-spacing:0.04em;
                            position:absolute;inset:0;text-align:right;padding-right:2px;">—</div>
                    </div>
                </div>
                <div id="${id}-l0" style="font:700 8px/1 'Arial',sans-serif;color:rgba(226,232,240,0.3);
                    text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;">—</div>
            </div>
            <div style="text-align:center;flex:1;">
                <div style="
                    background:linear-gradient(180deg, #9aaa8a, #8a9a7a);
                    border:2px solid #2a2a2a;border-radius:2px;
                    box-shadow:inset 0 1px 3px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.008);
                    padding:4px 4px 3px;text-align:right;
                    position:relative;overflow:hidden;
                ">
                    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent 40%,rgba(0,0,0,0.04));pointer-events:none;"></div>
                    <div style="position:relative;">
                        <div style="font:700 18px/1 'JetBrains Mono',monospace;color:rgba(40,50,35,0.08);letter-spacing:0.04em;padding-right:2px;">888.88</div>
                        <div id="${id}-v1" style="font:700 18px/1 'JetBrains Mono',monospace;color:#0a1208;letter-spacing:0.04em;
                            position:absolute;inset:0;text-align:right;padding-right:2px;">—</div>
                    </div>
                </div>
                <div id="${id}-l1" style="font:700 8px/1 'Arial',sans-serif;color:rgba(226,232,240,0.3);
                    text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;">—</div>
            </div>
            <div style="text-align:center;flex:1;">
                <div style="
                    background:linear-gradient(180deg, #9aaa8a, #8a9a7a);
                    border:2px solid #2a2a2a;border-radius:2px;
                    box-shadow:inset 0 1px 3px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.008);
                    padding:4px 4px 3px;text-align:right;
                    position:relative;overflow:hidden;
                ">
                    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent 40%,rgba(0,0,0,0.04));pointer-events:none;"></div>
                    <div style="position:relative;">
                        <div style="font:700 18px/1 'JetBrains Mono',monospace;color:rgba(40,50,35,0.08);letter-spacing:0.04em;padding-right:2px;">888.88</div>
                        <div id="${id}-v2" style="font:700 18px/1 'JetBrains Mono',monospace;color:#0a1208;letter-spacing:0.04em;
                            position:absolute;inset:0;text-align:right;padding-right:2px;">—</div>
                    </div>
                </div>
                <div id="${id}-l2" style="font:700 8px/1 'Arial',sans-serif;color:rgba(226,232,240,0.3);
                    text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;">—</div>
            </div>
            <div style="text-align:center;flex:1;">
                <div style="
                    background:linear-gradient(180deg, #9aaa8a, #8a9a7a);
                    border:2px solid #2a2a2a;border-radius:2px;
                    box-shadow:inset 0 1px 3px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.008);
                    padding:4px 4px 3px;text-align:right;
                    position:relative;overflow:hidden;
                ">
                    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent 40%,rgba(0,0,0,0.04));pointer-events:none;"></div>
                    <div style="position:relative;">
                        <div style="font:700 18px/1 'JetBrains Mono',monospace;color:rgba(40,50,35,0.08);letter-spacing:0.04em;padding-right:2px;">888.88</div>
                        <div id="${id}-v3" style="font:700 18px/1 'JetBrains Mono',monospace;color:#0a1208;letter-spacing:0.04em;
                            position:absolute;inset:0;text-align:right;padding-right:2px;">—</div>
                    </div>
                </div>
                <div id="${id}-l3" style="font:700 8px/1 'Arial',sans-serif;color:rgba(226,232,240,0.3);
                    text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;">—</div>
            </div>
        </div>

        <span style="font:300 10px/1 'Courier New',monospace;color:rgba(200,180,140,0.08);writing-mode:vertical-lr;">RD-04</span>
    </div>
</div>

<div class="rack-unit-back u2" data-unit-back="readout" data-id="${id}" style="
    background:linear-gradient(180deg, #1c1c1c, #181818);overflow:hidden;
">
    <div style="display:flex;align-items:center;padding:6px 48px;height:100%;gap:10px;">
        <span style="font:800 10px/1 'Arial Black',sans-serif;color:rgba(255,255,255,0.08);letter-spacing:0.15em;text-transform:uppercase;">Register</span>
        <span style="font:400 11px/1 'Courier New',monospace;color:rgba(255,255,255,0.05);">RD-04</span>
        <div class="patch-group" style="margin-left:10px;"><div class="patch-jack" data-input="values" data-unit-id="${id}"></div><div class="patch-jack-label">values</div></div>
        <div style="font:300 5px/1.6 'Courier New',monospace;color:rgba(74,222,128,0.04);margin-left:auto;text-align:right;">
            FORGERACK REGISTER &#x2022; RD-04 REV.B<br>4-CH LCD READOUT &#x2022; SVEND MFG
        </div>
    </div>
</div>
