<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  REGISTER RD-04 — Instrument Cluster Readout                ║
 ║  Identity: Aircraft cockpit gauge panel. Chrome bezels       ║
 ║  around each window. Dark slate. Sturdy, compact.            ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<div class="rack-unit-front u2" data-unit="readout" data-id="${id}" style="
    --device-accent:#e2e8f0;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.002) 0px, transparent 1px, transparent 3px),
        linear-gradient(160deg, #0f110f 0%, #0d0f0d 40%, #0e100e 60%, #0c0e0c 100%);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;padding:5px 48px;height:100%;gap:8px;">

        <!-- Vertical brand — etched into side -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            <span style="
                font:900 8px/1 'Arial Black',sans-serif;
                color:transparent;
                text-shadow: 0 1px 0 rgba(226,232,240,0.15), 0 -1px 0 rgba(0,0,0,0.6);
                -webkit-text-stroke: 0.3px rgba(226,232,240,0.08);
                letter-spacing:0.2em;text-transform:uppercase;
                writing-mode:vertical-lr;transform:rotate(180deg);
            ">Register</span>
        </div>

        <!-- 4 gauge windows — each with chrome bezel -->
        <div style="display:flex;gap:8px;flex:1;justify-content:center;">
            <div style="background:rgba(0,0,0,0.35);border:1px solid rgba(226,232,240,0.05);border-radius:2px;
                box-shadow:inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.008);padding:4px 8px;text-align:center;min-width:52px;">
                <div style="position:relative;">
                    <div style="font:700 20px/1 'JetBrains Mono',monospace;color:rgba(226,232,240,0.02);">88.8</div>
                    <div id="${id}-v0" style="font:700 20px/1 'JetBrains Mono',monospace;color:#e2e8f0;
                        text-shadow:0 0 8px rgba(226,232,240,0.1);position:absolute;inset:0;">&#x2014;</div>
                </div>
                <div id="${id}-l0" style="font:700 6px/1 'Arial',sans-serif;color:rgba(226,232,240,0.15);
                    text-transform:uppercase;letter-spacing:0.15em;margin-top:2px;">—</div>
            </div>
            <div style="background:rgba(0,0,0,0.35);border:1px solid rgba(226,232,240,0.05);border-radius:2px;
                box-shadow:inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.008);padding:4px 8px;text-align:center;min-width:52px;">
                <div style="position:relative;">
                    <div style="font:700 20px/1 'JetBrains Mono',monospace;color:rgba(226,232,240,0.02);">88.8</div>
                    <div id="${id}-v1" style="font:700 20px/1 'JetBrains Mono',monospace;color:#e2e8f0;
                        text-shadow:0 0 8px rgba(226,232,240,0.1);position:absolute;inset:0;">&#x2014;</div>
                </div>
                <div id="${id}-l1" style="font:700 6px/1 'Arial',sans-serif;color:rgba(226,232,240,0.15);
                    text-transform:uppercase;letter-spacing:0.15em;margin-top:2px;">—</div>
            </div>
            <div style="background:rgba(0,0,0,0.35);border:1px solid rgba(226,232,240,0.05);border-radius:2px;
                box-shadow:inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.008);padding:4px 8px;text-align:center;min-width:52px;">
                <div style="position:relative;">
                    <div style="font:700 20px/1 'JetBrains Mono',monospace;color:rgba(226,232,240,0.02);">88.8</div>
                    <div id="${id}-v2" style="font:700 20px/1 'JetBrains Mono',monospace;color:#e2e8f0;
                        text-shadow:0 0 8px rgba(226,232,240,0.1);position:absolute;inset:0;">&#x2014;</div>
                </div>
                <div id="${id}-l2" style="font:700 6px/1 'Arial',sans-serif;color:rgba(226,232,240,0.15);
                    text-transform:uppercase;letter-spacing:0.15em;margin-top:2px;">—</div>
            </div>
            <div style="background:rgba(0,0,0,0.35);border:1px solid rgba(226,232,240,0.05);border-radius:2px;
                box-shadow:inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.008);padding:4px 8px;text-align:center;min-width:52px;">
                <div style="position:relative;">
                    <div style="font:700 20px/1 'JetBrains Mono',monospace;color:rgba(226,232,240,0.02);">88.8</div>
                    <div id="${id}-v3" style="font:700 20px/1 'JetBrains Mono',monospace;color:#e2e8f0;
                        text-shadow:0 0 8px rgba(226,232,240,0.1);position:absolute;inset:0;">&#x2014;</div>
                </div>
                <div id="${id}-l3" style="font:700 6px/1 'Arial',sans-serif;color:rgba(226,232,240,0.15);
                    text-transform:uppercase;letter-spacing:0.15em;margin-top:2px;">—</div>
            </div>
        </div>

        <span style="font:300 8px/1 'Courier New',monospace;color:rgba(200,180,140,0.08);writing-mode:vertical-lr;">RD-04</span>
    </div>
</div>

<div class="rack-unit-back u2" data-unit-back="readout" data-id="${id}" style="
    background:linear-gradient(180deg, #1c1c1c, #181818);overflow:hidden;
">
    <div style="display:flex;align-items:center;padding:6px 48px;height:100%;gap:10px;">
        <span style="font:800 8px/1 'Arial Black',sans-serif;color:rgba(255,255,255,0.08);letter-spacing:0.15em;text-transform:uppercase;">Register</span>
        <span style="font:400 7px/1 'Courier New',monospace;color:rgba(255,255,255,0.05);">RD-04</span>
        <div class="patch-group" style="margin-left:10px;"><div class="patch-jack" data-input="values" data-unit-id="${id}"></div><div class="patch-jack-label">values</div></div>
        <div style="font:300 5px/1.6 'Courier New',monospace;color:rgba(74,222,128,0.04);margin-left:auto;text-align:right;">
            FORGERACK REGISTER &#x2022; RD-04 REV.A<br>4-CH READOUT &#x2022; SVEND MFG
        </div>
    </div>
</div>
