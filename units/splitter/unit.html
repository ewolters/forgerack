<!--
  SPLITTER — Signal Fan-out
  FRONT: Brushed aluminum, 1 in → 4 out, stamped labels
  BACK: Same jacks mirrored, model plate, PCB traces
-->
<div class="rack-unit-front" data-unit="splitter" data-id="${id}" data-u="1" style="
    --device-accent:#64748b;
    min-height:52px;
    background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.004) 0px, transparent 1px, transparent 4px),
        linear-gradient(180deg, #141714, #101310);
    border:1px solid rgba(100,116,139,0.06);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.01), 0 2px 6px rgba(0,0,0,0.4);
">

    <div style="display:flex;align-items:center;padding:4px 12px;height:100%;gap:10px;">
        <span style="
            font:800 8px/1 'Arial Narrow',Impact,sans-serif;color:transparent;
            text-shadow: 0 1px 0 rgba(100,116,139,0.2), 0 -1px 0 rgba(0,0,0,0.5);
            -webkit-text-stroke: 0.3px rgba(100,116,139,0.12);
            letter-spacing:0.25em;text-transform:uppercase;
        ">SPLIT</span>

        <div style="display:flex;align-items:center;gap:3px;padding:3px 6px;
            background:rgba(0,0,0,0.2);border:1px solid rgba(0,0,0,0.3);border-radius:10px;
            box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);">
            <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.2);text-transform:uppercase;letter-spacing:0.15em;">IN</span>
            <div class="jack" data-input="signal"></div>
        </div>

        <span style="color:rgba(100,116,139,0.1);font-size:14px;">&#x25B8;&#x25B8;</span>

        <div style="display:flex;gap:8px;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
                <div class="jack" data-output="a"></div>
                <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.15);">A</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
                <div class="jack" data-output="b"></div>
                <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.15);">B</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
                <div class="jack" data-output="c"></div>
                <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.15);">C</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
                <div class="jack" data-output="d"></div>
                <span style="font:700 5px/1 'Arial',sans-serif;color:rgba(100,116,139,0.15);">D</span>
            </div>
        </div>
        <span style="font:400 6px/1 'Courier New',monospace;color:rgba(200,180,140,0.12);margin-left:auto;">SP-04</span>
    </div>
</div>

<div class="rack-unit-back" data-unit-back="splitter" data-id="${id}" style="
    min-height:52px;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.003) 0px, transparent 1px, transparent 4px),
        linear-gradient(180deg, #1c1c1c, #181818);
    border:1px solid rgba(255,255,255,0.03);
">

    <div style="display:flex;align-items:center;padding:4px 12px;height:100%;gap:8px;">
        <span style="font:700 7px/1 'Arial',sans-serif;color:rgba(255,255,255,0.08);letter-spacing:0.15em;text-transform:uppercase;">SP-04</span>
        <div style="display:flex;gap:10px;margin-left:8px;">
            <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">in</div></div>
            <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">a</div></div>
            <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">b</div></div>
            <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">c</div></div>
            <div class="patch-group"><div class="patch-jack"></div><div class="patch-jack-label">d</div></div>
        </div>
        <span style="font:400 6px/1 'Courier New',monospace;color:rgba(74,222,128,0.05);margin-left:auto;">FORGERACK SP-04 REV.A</span>
    </div>
</div>
