<div class="rack-unit-front u11 mfr-kosmos tex-matte chamfer-heavy" data-unit="strategist" data-id="${id}" style="
    --device-accent:#a3b18a;
    background:
        radial-gradient(ellipse at 30% 40%, rgba(163,177,138,0.01), transparent 50%),
        linear-gradient(165deg, #2a2e22 0%, #242820 30%, #282c24 50%, #1e2218 80%);
    overflow:hidden;position:relative;
">
    <!-- ══ NAMEPLATE (fixed) ══ -->
    <div style="
        display:flex;align-items:center;gap:10px;
        padding:6px 48px;position:relative;
        border-bottom:2px solid rgba(0,0,0,0.4);
        background: linear-gradient(180deg, #2e3226 0%, #282c22 50%, #22261c 100%);
    ">
        <div style="position:absolute;left:34px;top:50%;transform:translateY(-50%);width:7px;height:7px;
            background:radial-gradient(circle at 35% 35%, #5a5e4a, #2a2e22);
            clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div>
        <div style="position:absolute;right:34px;top:50%;transform:translateY(-50%);width:7px;height:7px;
            background:radial-gradient(circle at 35% 35%, #5a5e4a, #2a2e22);
            clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div>
        <div class="led-housing"><span class="led lg" id="${id}-led"></span></div>
        <span style="font:700 13px/1 'Courier New',monospace;color:rgba(163,177,138,0.4);letter-spacing:0.2em;text-transform:uppercase;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.5), 0 1px 0 rgba(255,240,215,0.02);">DSh-K11</span>
        <span style="font:400 8px/1 'Courier New',monospace;color:rgba(163,177,138,0.15);">DIMITROV-SHAPOVALOV</span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
            <svg width="12" height="12" viewBox="0 0 12 12" style="opacity:0.06;">
                <polygon points="6,0.5 7.5,4.5 11.5,4.5 8.2,7.2 9.5,11.5 6,8.8 2.5,11.5 3.8,7.2 0.5,4.5 4.5,4.5" fill="#a3b18a"/>
            </svg>
            <span style="font:700 8px/1 'Courier New',monospace;color:rgba(163,177,138,0.1);">KOSMOS</span>
        </div>
    </div>

    <!-- ══ HEX BOLTS (fixed hardware) ══ -->
    <div style="position:absolute;top:38px;left:46px;width:9px;height:9px;z-index:10;
        background:radial-gradient(circle at 35% 35%, #5a5e4a, #3a3e2e 40%, #2a2e22 70%, #1e2218);
        clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div>
    <div style="position:absolute;top:38px;right:46px;width:9px;height:9px;z-index:10;
        background:radial-gradient(circle at 35% 35%, #5a5e4a, #3a3e2e 40%, #2a2e22 70%, #1e2218);
        clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div>

    <!-- ══ MAIN AREA — absolute positioned cutouts ══ -->
    <div style="position:absolute;top:52px;left:48px;right:48px;bottom:16px;">

        <!-- CUTOUT-A: factor-display — tag + CRT -->
        <div style="position:absolute;left:0;top:0;width:170px;height:120px;
            background:#000;border:1px solid rgba(163,177,138,0.15);
            display:flex;align-items:center;justify-content:center;">
            <span style="font:700 10px/1 'Courier New',monospace;color:rgba(163,177,138,0.4);text-transform:uppercase;letter-spacing:0.1em;">
                A: factor-display<br>
                <span style="font-weight:400;font-size:9px;color:rgba(163,177,138,0.2);">170 × 120</span>
            </span>
        </div>

        <!-- CUTOUT-B: factor-entry — toggle + inputs + N/R -->
        <div style="position:absolute;left:0;top:126px;width:170px;height:268px;
            background:#000;border:1px solid rgba(163,177,138,0.15);
            display:flex;align-items:center;justify-content:center;">
            <span style="font:700 10px/1 'Courier New',monospace;color:rgba(163,177,138,0.4);text-transform:uppercase;letter-spacing:0.1em;text-align:center;">
                B: factor-entry<br>
                <span style="font-weight:400;font-size:9px;color:rgba(163,177,138,0.2);">170 × 268</span>
            </span>
        </div>

        <!-- CUTOUT-C: runsheet-header — tag + runs counter + badge -->
        <div style="position:absolute;left:182px;top:0;right:134px;height:28px;
            background:#000;border:1px solid rgba(163,177,138,0.15);
            display:flex;align-items:center;justify-content:center;">
            <span style="font:700 9px/1 'Courier New',monospace;color:rgba(163,177,138,0.4);text-transform:uppercase;letter-spacing:0.1em;">
                C: runsheet-header
            </span>
        </div>

        <!-- CUTOUT-D: runsheet-crt — frame bezel + CRT screen -->
        <div style="position:absolute;left:182px;top:34px;right:134px;bottom:0;
            background:#000;border:1px solid rgba(163,177,138,0.15);
            display:flex;align-items:center;justify-content:center;">
            <span style="font:700 10px/1 'Courier New',monospace;color:rgba(163,177,138,0.4);text-transform:uppercase;letter-spacing:0.1em;text-align:center;">
                D: runsheet-crt<br>
                <span style="font-weight:400;font-size:9px;color:rgba(163,177,138,0.2);">flex × flex</span>
            </span>
        </div>

        <!-- CUTOUT-E: category-dial — dial + 6 labels + tag -->
        <div style="position:absolute;right:0;top:0;width:122px;height:110px;
            background:#000;border:1px solid rgba(163,177,138,0.15);
            display:flex;align-items:center;justify-content:center;">
            <span style="font:700 10px/1 'Courier New',monospace;color:rgba(163,177,138,0.4);text-transform:uppercase;letter-spacing:0.1em;text-align:center;">
                E: category-dial<br>
                <span style="font-weight:400;font-size:9px;color:rgba(163,177,138,0.2);">122 × 110</span>
            </span>
        </div>

        <!-- CUTOUT-F: type-dial — dial + dynamic labels + tag -->
        <div style="position:absolute;right:0;top:120px;width:122px;height:110px;
            background:#000;border:1px solid rgba(163,177,138,0.15);
            display:flex;align-items:center;justify-content:center;">
            <span style="font:700 10px/1 'Courier New',monospace;color:rgba(163,177,138,0.4);text-transform:uppercase;letter-spacing:0.1em;text-align:center;">
                F: type-dial<br>
                <span style="font-weight:400;font-size:9px;color:rgba(163,177,138,0.2);">122 × 110</span>
            </span>
        </div>

        <!-- CUTOUT-G: generate — button + tag -->
        <div style="position:absolute;right:0;bottom:0;width:122px;height:90px;
            background:#000;border:1px solid rgba(163,177,138,0.15);
            display:flex;align-items:center;justify-content:center;">
            <span style="font:700 10px/1 'Courier New',monospace;color:rgba(163,177,138,0.4);text-transform:uppercase;letter-spacing:0.1em;text-align:center;">
                G: generate<br>
                <span style="font-weight:400;font-size:9px;color:rgba(163,177,138,0.2);">122 × 90</span>
            </span>
        </div>

    </div>

    <!-- ══ BOTTOM HEX BOLTS (fixed hardware) ══ -->
    <div style="position:absolute;bottom:5px;left:46px;width:9px;height:9px;z-index:10;
        background:radial-gradient(circle at 35% 35%, #5a5e4a, #3a3e2e 40%, #2a2e22 70%, #1e2218);
        clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div>
    <div style="position:absolute;bottom:5px;right:46px;width:9px;height:9px;z-index:10;
        background:radial-gradient(circle at 35% 35%, #5a5e4a, #3a3e2e 40%, #2a2e22 70%, #1e2218);
        clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div>
</div>
