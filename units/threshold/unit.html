<!--
 ╔══════════════════════════════════════════════════════════════╗
 ║  TRIPWIRE TW-01 — Threshold Alarm Gate                       ║
 ║  Manufacturer: GUARDIAN                                      ║
 ║  Identity: Navy steel, amber accent. Watchful vigilance.     ║
 ║  Fires signal output when value crosses limit. Connects      ║
 ║  rack analysis to the Loop's signal system.                  ║
 ╚══════════════════════════════════════════════════════════════╝
-->

<!-- ════════ FRONT PANEL ════════ -->
<div class="rack-unit-front u2 mfr-guardian" data-unit="threshold" data-id="${id}" style="
    --device-accent:#d97706;
    background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.003) 0px, transparent 1px, transparent 3px),
        linear-gradient(160deg, #0e1118 0%, #0c0f16 30%, #0d1017 50%, #0a0d14 80%);
    overflow:hidden;
">
    <!-- Nameplate -->
    <div style="
        display:flex;align-items:center;gap:8px;
        padding:3px 48px;
        border-bottom:1px solid rgba(0,0,0,0.4);
        background: linear-gradient(180deg, rgba(217,119,6,0.006), rgba(0,0,0,0.1));
    ">
        <div class="led-housing"><span class="led" id="${id}-led-arm" style="width:6px;height:6px;"></span></div>
        <span style="font:800 12px/1 'Arial Narrow','Arial',sans-serif;color:rgba(217,119,6,0.3);letter-spacing:0.18em;text-transform:uppercase;">Tripwire</span>
        <span style="font:300 9px/1 'Arial Narrow',sans-serif;color:rgba(217,119,6,0.1);font-style:italic;">Threshold Gate</span>

        <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
            <!-- Alarm LED — big, red when tripped -->
            <div style="display:flex;align-items:center;gap:3px;">
                <span class="led lg" id="${id}-led-alarm"></span>
                <span style="font:700 8px/1 'Arial Narrow',sans-serif;color:rgba(239,68,68,0.2);letter-spacing:0.08em;">ALARM</span>
            </div>
            <span style="font:600 9px/1 'Courier New',monospace;color:rgba(217,119,6,0.1);">TW-01</span>
        </div>
    </div>

    <!-- Controls -->
    <div style="padding:4px 48px;display:flex;align-items:center;gap:10px;">
        <!-- Column -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
            <select id="${id}-col" class="styled-select" style="min-width:70px;font-size:9px;background:rgba(0,0,0,0.4);border:1px solid rgba(217,119,6,0.1);color:#d97706;padding:2px 4px;border-radius:1px;">
                <option value="">col</option>
            </select>
            <span style="font:700 7px/1 'Arial',sans-serif;color:rgba(217,119,6,0.15);letter-spacing:0.1em;text-transform:uppercase;">Watch</span>
        </div>

        <!-- Direction -->
        <div class="segment" style="height:20px;">
            <button class="segment-btn active" id="${id}-dir-above" onclick="FR.units['${id}']?.setDir?.('above')" style="padding:2px 6px;font-size:8px;">Above</button>
            <button class="segment-btn" id="${id}-dir-below" onclick="FR.units['${id}']?.setDir?.('below')" style="padding:2px 6px;font-size:8px;">Below</button>
        </div>

        <!-- Limit value -->
        <input type="text" id="${id}-limit" placeholder="limit" class="input-mono" style="width:50px;font-size:9px;padding:2px 4px;background:rgba(0,0,0,0.4);border:1px solid rgba(217,119,6,0.1);color:#d97706;border-radius:1px;text-align:center;">

        <!-- Arm toggle -->
        <button class="btn-toggle" id="${id}-arm" onclick="FR.units['${id}']?.toggleArm?.()" style="padding:3px 8px;font-size:8px;">Armed</button>

        <!-- Trip count -->
        <div style="margin-left:auto;">
            <div class="readout sm">
                <div class="readout-value" id="${id}-trips" style="font-size:13px;color:#d97706;min-width:30px;">0</div>
                <div class="readout-label" style="color:rgba(217,119,6,0.2);">Trips</div>
            </div>
        </div>
    </div>
</div>

<!-- ════════ BACK PANEL ════════ -->
<div class="rack-unit-back u2" data-unit-back="threshold" data-id="${id}" style="
    background: repeating-linear-gradient(180deg, rgba(255,255,255,0.008) 0px, transparent 1px, transparent 4px),
                linear-gradient(160deg, #1c1c1c, #1f1f1f 40%, #1d1d1d);
    overflow:hidden;
">
    <div style="display:flex;align-items:center;gap:8px;padding:5px 48px;border-bottom:1px solid rgba(255,255,255,0.05);">
        <span style="font:700 11px/1 'Arial',sans-serif;color:rgba(255,255,255,0.1);text-transform:uppercase;letter-spacing:0.15em;">Tripwire</span>
        <span style="font:400 11px/1 'Courier New',monospace;color:rgba(255,255,255,0.06);">TW-01</span>
        <span style="font:400 9px/1 'Courier New',monospace;color:rgba(255,255,255,0.04);margin-left:auto;">S/N ${id}</span>
    </div>
    <div style="padding:8px 48px;display:flex;gap:24px;">
        <div>
            <div style="font:700 10px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px;">Input</div>
            <div class="patch-group"><div class="patch-jack" data-input="data" data-unit-id="${id}"></div><div class="patch-jack-label">Data</div></div>
        </div>
        <div>
            <div style="font:700 10px/1 'Arial',sans-serif;color:rgba(255,255,255,0.07);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:8px;">Output</div>
            <div style="display:flex;gap:12px;">
                <div class="patch-group"><div class="patch-jack" data-output="alarm" data-unit-id="${id}"></div><div class="patch-jack-label">Alarm</div></div>
                <div class="patch-group"><div class="patch-jack" data-output="thru" data-unit-id="${id}"></div><div class="patch-jack-label">Thru</div></div>
            </div>
        </div>
    </div>
</div>
